// Inline markdown renderer with [[wikilink]] resolution
function renderMarkdown(src, navigateTo) {
  const lines = src.split('\n');
  return lines.map((line, i) => {
    if (line.startsWith('# ')) {
      return null; // title shown separately
    }
    if (line.startsWith('## ')) {
      return <h2 key={i} style={{ fontFamily:'var(--font-sans)', fontSize:13, fontWeight:600,
        color:'#fff', marginTop:16, marginBottom:8, paddingBottom:4,
        borderBottom:'1px solid #1E2028', letterSpacing:'-0.01em' }}>{line.slice(3)}</h2>;
    }
    if (line.startsWith('- ')) {
      return <div key={i} style={{ paddingLeft:14, marginBottom:3 }}>
        <span style={{ color:'rgba(255,255,255,0.3)', marginRight:6 }}>·</span>
        {renderInline(line.slice(2), navigateTo)}
      </div>;
    }
    if (!line.trim()) return <div key={i} style={{ height:6 }}></div>;
    return <div key={i} style={{ marginBottom:6 }}>{renderInline(line, navigateTo)}</div>;
  });
}

function renderInline(text, navigateTo) {
  // [[wikilink]] then **bold** then _italic_
  const parts = [];
  const re = /\[\[([^\]]+)\]\]|\*\*([^*]+)\*\*|_([^_]+)_/g;
  let last = 0; let m; let key = 0;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push(<span key={key++}>{text.slice(last, m.index)}</span>);
    if (m[1]) {
      const target = m[1];
      const exists = WIKI_NODES.find(n => n.id === target);
      const color = exists?.color || '#FF4500';
      parts.push(
        <span key={key++} onClick={() => exists && navigateTo(target)}
          style={{ fontFamily:'var(--font-mono)', fontSize:12, color,
            background:`${color}14`, border:`1px solid ${color}33`,
            padding:'1px 6px', borderRadius:2, cursor: exists ? 'pointer' : 'not-allowed',
            opacity: exists ? 1 : 0.5, textDecoration: exists ? 'none' : 'line-through',
            transition:'all 0.1s' }}
          onMouseEnter={e => exists && (e.currentTarget.style.background=`${color}28`)}
          onMouseLeave={e => exists && (e.currentTarget.style.background=`${color}14`)}>
          {target}
        </span>
      );
    } else if (m[2]) {
      parts.push(<strong key={key++} style={{ color:'#fff', fontWeight:600 }}>{m[2]}</strong>);
    } else if (m[3]) {
      parts.push(<em key={key++} style={{ color:'rgba(255,255,255,0.5)', fontStyle:'italic' }}>{m[3]}</em>);
    }
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push(<span key={key++}>{text.slice(last)}</span>);
  return parts;
}

// ── FILTERABLE SCHEMA-AWARE GRAPH ──────────────────────────────────────
// Exposes every entity type + every frontmatter relation as a toggleable filter.
// Walks the full graph (not just 1-hop) and ranks neighbours by graph distance.

const ENTITY_SCHEMA = {
  task:     { label:'Task',     color:'#00FF9F', sym:'▸',
              statuses:['done','open','in_progress','blocked','updated'],
              priorities:['P0','P1','P2'] },
  prompt:   { label:'Prompt',   color:'#FFD700', sym:'◈',
              kinds:['task-spec','research-proposal','tool-instruction','follow-up'] },
  research: { label:'Research', color:'#FFDF00', sym:'◎',
              phases:['complete','in_progress'] },
};

const RELATION_SCHEMA = [
  { id:'uses_prompt',      label:'task → prompt',      from:'task',     to:'prompt',   color:'rgba(0,255,159,0.45)' },
  { id:'spawns_research',  label:'task → research',    from:'task',     to:'research', color:'rgba(0,255,159,0.30)' },
  { id:'relates_to_task',  label:'prompt → task',      from:'prompt',   to:'task',     color:'rgba(255,215,0,0.40)' },
  { id:'executes_prompt',  label:'research → prompt',  from:'research', to:'prompt',   color:'rgba(255,223,0,0.45)' },
];

function buildFullGraph() {
  const idx = {};
  WIKI_NODES.forEach(n => { idx[n.id] = { ...n, edges: [] }; });
  D.tasks.forEach(t => {
    (t.uses_prompts||[]).forEach(s => {
      const e = { rel:'uses_prompt', from:`task/${t.id}`, to:`prompt/${s}` };
      if (idx[e.from] && idx[e.to]) { idx[e.from].edges.push(e); idx[e.to].edges.push(e); }
    });
    (t.spawns_research||[]).forEach(s => {
      const e = { rel:'spawns_research', from:`task/${t.id}`, to:`research/${s}` };
      if (idx[e.from] && idx[e.to]) { idx[e.from].edges.push(e); idx[e.to].edges.push(e); }
    });
  });
  D.prompts.forEach(p => {
    if (p.relates_to_task) {
      const taskNode = D.tasks.find(t => t.id === p.relates_to_task || t.slug === p.relates_to_task);
      if (taskNode) {
        const e = { rel:'relates_to_task', from:`prompt/${p.slug}`, to:`task/${taskNode.id}` };
        if (idx[e.from] && idx[e.to]) { idx[e.from].edges.push(e); idx[e.to].edges.push(e); }
      }
    }
  });
  D.research.forEach(r => {
    if (r.executes_prompt) {
      const e = { rel:'executes_prompt', from:`research/${r.slug}`, to:`prompt/${r.executes_prompt}` };
      if (idx[e.from] && idx[e.to]) { idx[e.from].edges.push(e); idx[e.to].edges.push(e); }
    }
  });
  return idx;
}

const FULL_GRAPH = buildFullGraph();

function FilterableGraph({ current, navigateTo }) {
  const [enabledTypes, setEnabledTypes] = useState({ task:true, prompt:true, research:true });
  const [enabledRels, setEnabledRels] = useState(
    Object.fromEntries(RELATION_SCHEMA.map(r => [r.id, true]))
  );
  const [statusFilter, setStatusFilter] = useState('all'); // task status
  const [kindFilter, setKindFilter] = useState('all');     // prompt kind
  const [phaseFilter, setPhaseFilter] = useState('all');   // research phase
  const [hops, setHops] = useState(2); // 1, 2, all
  const [hoveredNode, setHoveredNode] = useState(null);

  // BFS from current up to N hops, respecting filters
  const subgraph = useMemo(() => {
    if (!FULL_GRAPH[current]) return { nodes:[], edges:[], distances:{} };

    const matchesFilters = (node) => {
      if (!enabledTypes[node.type]) return false;
      if (node.type === 'task' && statusFilter !== 'all' && node.raw.status !== statusFilter) return false;
      if (node.type === 'prompt' && kindFilter !== 'all' && node.raw.kind !== kindFilter) return false;
      if (node.type === 'research' && phaseFilter !== 'all' && node.raw.phase !== phaseFilter) return false;
      return true;
    };

    const visited = { [current]: 0 };
    const queue = [current];
    const maxHops = hops === 'all' ? 99 : hops;
    while (queue.length) {
      const cur = queue.shift();
      const dist = visited[cur];
      if (dist >= maxHops) continue;
      (FULL_GRAPH[cur].edges || []).forEach(e => {
        if (!enabledRels[e.rel]) return;
        const next = e.from === cur ? e.to : e.from;
        if (visited[next] !== undefined) return;
        const nextNode = FULL_GRAPH[next];
        if (!nextNode) return;
        // Filter applies to all nodes EXCEPT the current centre
        if (next !== current && !matchesFilters(nextNode)) return;
        visited[next] = dist + 1;
        queue.push(next);
      });
    }

    const nodeIds = new Set(Object.keys(visited));
    const nodes = Array.from(nodeIds).map(id => ({ ...FULL_GRAPH[id], dist: visited[id] }));
    const edgeKey = e => `${e.from}|${e.to}|${e.rel}`;
    const seenEdges = new Set();
    const edges = [];
    nodes.forEach(n => {
      n.edges.forEach(e => {
        if (!enabledRels[e.rel]) return;
        if (!nodeIds.has(e.from) || !nodeIds.has(e.to)) return;
        const k = edgeKey(e);
        if (seenEdges.has(k)) return;
        seenEdges.add(k);
        edges.push(e);
      });
    });
    return { nodes, edges, distances: visited };
  }, [current, enabledTypes, enabledRels, statusFilter, kindFilter, phaseFilter, hops]);

  // Layout: concentric rings by distance
  const W = 340, H = 380, cx = W/2, cy = H/2;
  const positions = useMemo(() => {
    const byDist = {};
    subgraph.nodes.forEach(n => {
      if (!byDist[n.dist]) byDist[n.dist] = [];
      byDist[n.dist].push(n);
    });
    const out = {};
    Object.entries(byDist).forEach(([d, list]) => {
      const dist = Number(d);
      if (dist === 0) {
        out[list[0].id] = { x: cx, y: cy };
        return;
      }
      const r = 50 + dist * 55;
      list.forEach((n, i) => {
        const angle = (i / list.length) * Math.PI * 2 - Math.PI/2 + dist*0.3;
        out[n.id] = { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
      });
    });
    return out;
  }, [subgraph]);

  const Toggle = ({ on, color, onClick, children, sub }) => (
    <button onClick={onClick}
      style={{ display:'flex', alignItems:'center', gap:5,
        padding:'3px 7px', borderRadius:2, cursor:'pointer',
        background: on ? `${color}14` : 'transparent',
        border: `1px solid ${on ? color : '#252830'}`,
        color: on ? color : 'rgba(255,255,255,0.3)',
        fontFamily:'var(--font-mono)', fontSize:9, letterSpacing:'0.04em',
        transition:'all 0.1s' }}>
      {children}
      {sub !== undefined && <span style={{ opacity:0.6 }}>·{sub}</span>}
    </button>
  );

  // Counts visible per type
  const typeCounts = { task:0, prompt:0, research:0 };
  subgraph.nodes.forEach(n => { typeCounts[n.type]++; });
  const totalNodes = WIKI_NODES.length;

  return (
    <>
      <div style={{ padding:'12px 14px 10px', borderBottom:'1px solid #1E2028',
        display:'flex', alignItems:'center', gap:8 }}>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.3)',
          letterSpacing:'0.1em' }}>SCHEMA GRAPH</span>
        <span style={{ marginLeft:'auto', fontFamily:'var(--font-mono)', fontSize:9,
          color:'rgba(255,255,255,0.4)' }}>
          {subgraph.nodes.length}<span style={{ color:'rgba(255,255,255,0.2)' }}>/{totalNodes}</span> nodes
        </span>
      </div>

      {/* Filters */}
      <div style={{ padding:'10px 12px', borderBottom:'1px solid #1E2028',
        display:'flex', flexDirection:'column', gap:8, flexShrink:0 }}>

        <div>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:8,
            color:'rgba(255,255,255,0.25)', letterSpacing:'0.1em', marginBottom:5 }}>ENTITY TYPES</div>
          <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
            {Object.entries(ENTITY_SCHEMA).map(([t, cfg]) => (
              <Toggle key={t} on={enabledTypes[t]} color={cfg.color}
                sub={typeCounts[t]}
                onClick={() => setEnabledTypes(s => ({...s, [t]: !s[t]}))}>
                {cfg.sym} {cfg.label}
              </Toggle>
            ))}
          </div>
        </div>

        <div>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:8,
            color:'rgba(255,255,255,0.25)', letterSpacing:'0.1em', marginBottom:5 }}>RELATIONS</div>
          <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
            {RELATION_SCHEMA.map(r => (
              <Toggle key={r.id} on={enabledRels[r.id]} color={r.color.replace(/[\d.]+\)$/,'1)')}
                onClick={() => setEnabledRels(s => ({...s, [r.id]: !s[r.id]}))}>
                {r.label}
              </Toggle>
            ))}
          </div>
        </div>

        {enabledTypes.task && (
          <div>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:8,
              color:'rgba(255,255,255,0.25)', letterSpacing:'0.1em', marginBottom:5 }}>TASK STATUS</div>
            <div style={{ display:'flex', gap:3, flexWrap:'wrap' }}>
              {['all', ...ENTITY_SCHEMA.task.statuses].map(s => (
                <Toggle key={s} on={statusFilter===s} color="#00FF9F"
                  onClick={() => setStatusFilter(s)}>{s}</Toggle>
              ))}
            </div>
          </div>
        )}

        {enabledTypes.prompt && (
          <div>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:8,
              color:'rgba(255,255,255,0.25)', letterSpacing:'0.1em', marginBottom:5 }}>PROMPT KIND</div>
            <div style={{ display:'flex', gap:3, flexWrap:'wrap' }}>
              {['all', ...ENTITY_SCHEMA.prompt.kinds].map(k => (
                <Toggle key={k} on={kindFilter===k} color="#FFD700"
                  onClick={() => setKindFilter(k)}>{k}</Toggle>
              ))}
            </div>
          </div>
        )}

        {enabledTypes.research && (
          <div>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:8,
              color:'rgba(255,255,255,0.25)', letterSpacing:'0.1em', marginBottom:5 }}>RESEARCH PHASE</div>
            <div style={{ display:'flex', gap:3, flexWrap:'wrap' }}>
              {['all', ...ENTITY_SCHEMA.research.phases].map(p => (
                <Toggle key={p} on={phaseFilter===p} color="#FFDF00"
                  onClick={() => setPhaseFilter(p)}>{p}</Toggle>
              ))}
            </div>
          </div>
        )}

        <div>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:8,
            color:'rgba(255,255,255,0.25)', letterSpacing:'0.1em', marginBottom:5 }}>DEPTH</div>
          <div style={{ display:'flex', gap:3 }}>
            {[1, 2, 3, 'all'].map(h => (
              <Toggle key={h} on={hops===h} color="#fff"
                onClick={() => setHops(h)}>{h===1?'1 hop':h==='all'?'all':`${h} hops`}</Toggle>
            ))}
          </div>
        </div>
      </div>

      {/* Graph */}
      <div style={{ flex:1, overflow:'hidden', position:'relative', minHeight:0 }}>
        <svg width={W} height={H} style={{ display:'block' }}>
          <defs>
            {RELATION_SCHEMA.map(r => (
              <marker key={r.id} id={`arr-${r.id}`} viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill={r.color.replace(/[\d.]+\)$/,'1)')}/>
              </marker>
            ))}
            <radialGradient id="centreHalo" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="#00FF9F" stopOpacity="0.18"/>
              <stop offset="100%" stopColor="#00FF9F" stopOpacity="0"/>
            </radialGradient>
          </defs>

          {/* concentric guides */}
          {[1,2,3].map(d => (
            <circle key={d} cx={cx} cy={cy} r={50 + d*55}
              fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="1"
              strokeDasharray="2 4" />
          ))}

          {/* edges */}
          {subgraph.edges.map((e,i) => {
            const a = positions[e.from], b = positions[e.to];
            if (!a || !b) return null;
            const rel = RELATION_SCHEMA.find(r => r.id === e.rel);
            const dim = hoveredNode && hoveredNode !== e.from && hoveredNode !== e.to;
            return (
              <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                stroke={rel.color}
                strokeWidth={dim ? 0.6 : 1}
                opacity={dim ? 0.25 : 1}
                markerEnd={`url(#arr-${e.rel})`}
                style={{ transition:'all 0.15s',
                  animation: `terminal-line 0.4s ease ${Math.min(i,12)*30}ms both` }}/>
            );
          })}

          {/* centre halo */}
          {positions[current] && (
            <circle cx={cx} cy={cy} r="28" fill="url(#centreHalo)" />
          )}

          {/* nodes */}
          {subgraph.nodes.map((n,i) => {
            const p = positions[n.id];
            if (!p) return null;
            const isCurrent = n.id === current;
            const isHovered = hoveredNode === n.id;
            const dim = hoveredNode && !isHovered && n.id !== current;
            return (
              <g key={n.id} transform={`translate(${p.x},${p.y})`}
                style={{ cursor:'pointer',
                  animation: `node-spawn 0.35s ease ${Math.min(i,15)*30}ms both`,
                  opacity: dim ? 0.35 : 1, transition:'opacity 0.15s' }}
                onClick={() => navigateTo(n.id)}
                onMouseEnter={() => setHoveredNode(n.id)}
                onMouseLeave={() => setHoveredNode(null)}>
                <circle r={isCurrent ? 8 : 5} fill={n.color}
                  stroke={isCurrent ? '#fff' : n.color}
                  strokeWidth={isCurrent ? 1.5 : 0}
                  style={{ filter:`drop-shadow(0 0 ${isCurrent?6:3}px ${n.color}aa)` }}/>
                {(isCurrent || isHovered) && (
                  <text y={isCurrent ? 22 : 18} textAnchor="middle"
                    style={{ fontFamily:'var(--font-mono)', fontSize:9,
                      fill: isCurrent ? '#fff' : 'rgba(255,255,255,0.85)',
                      pointerEvents:'none' }}>
                    {n.id.split('/')[1].slice(0,16)}
                  </text>
                )}
              </g>
            );
          })}
        </svg>

        {/* Floating tooltip */}
        {hoveredNode && FULL_GRAPH[hoveredNode] && (
          <div style={{ position:'absolute', bottom:8, left:8, right:8,
            background:'#06080F', border:`1px solid ${FULL_GRAPH[hoveredNode].color}55`,
            borderRadius:3, padding:'8px 10px',
            fontFamily:'var(--font-mono)', fontSize:10,
            pointerEvents:'none' }}>
            <div style={{ color: FULL_GRAPH[hoveredNode].color, marginBottom:3 }}>
              {hoveredNode}
            </div>
            <div style={{ color:'rgba(255,255,255,0.5)', fontSize:9, lineHeight:1.4 }}>
              {FULL_GRAPH[hoveredNode].raw.summary?.slice(0,90)}…
            </div>
          </div>
        )}
      </div>

      {/* Relation legend */}
      <div style={{ padding:'8px 12px 10px', borderTop:'1px solid #1E2028',
        display:'flex', flexDirection:'column', gap:3 }}>
        {RELATION_SCHEMA.map(r => {
          const count = subgraph.edges.filter(e => e.rel === r.id).length;
          return (
            <div key={r.id} style={{ display:'flex', alignItems:'center', gap:6,
              opacity: enabledRels[r.id] ? 1 : 0.35 }}>
              <div style={{ width:18, height:1, background: r.color.replace(/[\d.]+\)$/,'1)') }}></div>
              <span style={{ fontFamily:'var(--font-mono)', fontSize:9,
                color:'rgba(255,255,255,0.5)' }}>{r.label}</span>
              <span style={{ marginLeft:'auto', fontFamily:'var(--font-mono)', fontSize:9,
                color:'rgba(255,255,255,0.3)' }}>{count}</span>
            </div>
          );
        })}
      </div>
    </>
  );
}

// Local graph: current node + 1-hop neighbours, animated force-ish layout
function LocalGraph({ current, navigateTo }) {
  const center = WIKI_NODES.find(n => n.id === current);
  if (!center) return null;

  const neighbours = useMemo(() => {
    const ns = [];
    center.links.forEach(l => {
      const t = WIKI_NODES.find(n => n.id === l.to);
      if (t) ns.push({ ...t, dir: 'out', kind: l.kind });
    });
    center.backlinks.forEach(b => {
      const t = WIKI_NODES.find(n => n.id === b.from);
      if (t) ns.push({ ...t, dir: 'in', kind: b.kind });
    });
    return ns;
  }, [current]);

  const W = 250, H = 380, cx = W/2, cy = H/2 - 20;
  const positions = useMemo(() => {
    return neighbours.map((n, i) => {
      const angle = (i / Math.max(neighbours.length, 1)) * Math.PI * 2 - Math.PI / 2;
      const r = 110;
      return { ...n, x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
    });
  }, [current, neighbours.length]);

  return (
    <svg width={W} height={H} style={{ display:'block' }} key={current}>
      <defs>
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor={center.color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={center.color} stopOpacity="0"/>
        </radialGradient>
      </defs>

      {/* edges */}
      {positions.map((n,i) => (
        <line key={i} x1={cx} y1={cy} x2={n.x} y2={n.y}
          stroke={n.dir === 'out' ? `${center.color}55` : `${n.color}55`}
          strokeWidth="1"
          strokeDasharray={n.dir === 'in' ? '4 4' : '0'}
          style={{ animation: `terminal-line 0.4s ease ${i*60}ms both` }}/>
      ))}

      {/* center halo */}
      <circle cx={cx} cy={cy} r="40" fill="url(#centerGlow)" />
      {/* center node */}
      <circle cx={cx} cy={cy} r="10" fill={center.color}
        style={{ filter:`drop-shadow(0 0 6px ${center.color})` }}/>
      <text x={cx} y={cy + 28} textAnchor="middle"
        style={{ fontFamily:'var(--font-mono)', fontSize:9, fill:'#fff', pointerEvents:'none' }}>
        {center.id.split('/')[1].slice(0,14)}
      </text>

      {/* neighbour nodes */}
      {positions.map((n,i) => (
        <g key={i} transform={`translate(${n.x},${n.y})`}
          style={{ cursor:'pointer', animation: `node-spawn 0.4s ease ${100+i*60}ms both` }}
          onClick={() => navigateTo(n.id)}>
          <circle r="6" fill={n.color}
            stroke={n.color} strokeWidth="1"
            style={{ filter:`drop-shadow(0 0 3px ${n.color}aa)` }}/>
          <text y="18" textAnchor="middle"
            style={{ fontFamily:'var(--font-mono)', fontSize:8,
              fill:'rgba(255,255,255,0.7)', pointerEvents:'none' }}>
            {n.id.split('/')[1].slice(0,12)}
          </text>
        </g>
      ))}

      {/* legend */}
      <g transform={`translate(10, ${H-40})`}>
        <text style={{ fontFamily:'var(--font-mono)', fontSize:8, fill:'rgba(255,255,255,0.3)', letterSpacing:'0.08em' }}>
          ── outgoing
        </text>
        <text y="14" style={{ fontFamily:'var(--font-mono)', fontSize:8, fill:'rgba(255,255,255,0.3)', letterSpacing:'0.08em' }}>
          ┄┄ backlink
        </text>
      </g>
    </svg>
  );
}

// Suggested next-research questions panel
function SuggestedQuestions({ current, relevant, other, navigateTo }) {
  const [generating, setGenerating] = useState(false);
  const [streamedQ, setStreamedQ] = useState(null);

  const askLLM = async () => {
    setGenerating(true);
    setStreamedQ('');
    try {
      const node = WIKI_NODES.find(n => n.id === current);
      const ctx = `${node.title}\n\n${node.body.slice(0, 400)}`;
      const resp = await window.claude.complete(
        `You are a research-direction assistant for a long-horizon AI agency repo. Given this node:\n\n${ctx}\n\nPropose ONE concrete, falsifiable research question that follows naturally from this node and could spawn a /research/ workspace. Keep it under 25 words. Output only the question.`
      );
      setStreamedQ(resp.trim());
    } catch (e) {
      setStreamedQ('LLM unavailable — using offline catalogue.');
    } finally {
      setGenerating(false);
    }
  };

  const renderQ = (q, i, highlighted) => (
    <div key={i} className="stagger-row"
      style={{ background:'#0D0F18',
        border:`1px solid ${highlighted ? '#FFDF0044' : '#1E2028'}`,
        borderLeft:`2px solid ${highlighted ? '#FFDF00' : 'rgba(255,255,255,0.15)'}`,
        borderRadius:3, padding:'10px 14px',
        animationDelay: `${i*60}ms` }}>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:8, fontWeight:700,
          color: q.priority==='P0' ? '#FF4500' : q.priority==='P1' ? '#FFD700' : 'rgba(255,255,255,0.4)',
          border:'1px solid currentColor', padding:'1px 5px', borderRadius:2 }}>{q.priority}</span>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.35)' }}>
          confidence
        </span>
        <div style={{ flex:1, height:3, background:'#1A1D24', borderRadius:1, overflow:'hidden', maxWidth:80 }}>
          <div style={{ height:'100%', width:`${q.confidence*100}%`,
            background: q.confidence > 0.75 ? '#00FF9F' : q.confidence > 0.6 ? '#FFD700' : '#FF8C00' }}></div>
        </div>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:9,
          color:'rgba(255,255,255,0.45)' }}>{(q.confidence*100).toFixed(0)}%</span>
      </div>
      <div style={{ fontFamily:'var(--font-sans)', fontSize:13, color:'rgba(255,255,255,0.85)',
        lineHeight:1.55, marginBottom:8 }}>
        <span style={{ color:'#FFDF00', fontFamily:'var(--font-mono)', marginRight:6 }}>?</span>
        {q.q}
      </div>
      <div style={{ display:'flex', gap:6, flexWrap:'wrap', alignItems:'center' }}>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:8, color:'rgba(255,255,255,0.3)',
          letterSpacing:'0.1em' }}>ANCHORS:</span>
        {q.anchors.map((a,j) => {
          const an = WIKI_NODES.find(n => n.id === a);
          if (!an) return null;
          return (
            <span key={j} onClick={() => navigateTo(a)}
              style={{ fontFamily:'var(--font-mono)', fontSize:9, color:an.color,
                background:`${an.color}14`, border:`1px solid ${an.color}33`,
                padding:'1px 6px', borderRadius:2, cursor:'pointer' }}>
              {a}
            </span>
          );
        })}
        <button style={{ marginLeft:'auto', fontFamily:'var(--font-mono)', fontSize:9,
          color:'#00FF9F', background:'rgba(0,255,159,0.06)',
          border:'1px solid rgba(0,255,159,0.25)', borderRadius:2,
          padding:'2px 8px', cursor:'pointer' }}>
          ▸ spawn research
        </button>
      </div>
    </div>
  );

  return (
    <div style={{ marginTop:8, marginBottom:8 }}>
      <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'#FFDF00',
          letterSpacing:'0.1em' }}>◇ NEXT-RESEARCH SUGGESTIONS</span>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.3)' }}>
          {relevant.length} anchored · {other.length} adjacent
        </span>
        <div style={{ flex:1 }}></div>
        <button onClick={askLLM} disabled={generating}
          style={{ fontFamily:'var(--font-mono)', fontSize:9, letterSpacing:'0.06em',
            color: generating ? 'rgba(255,255,255,0.3)' : '#00FF9F',
            background: generating ? '#1A1D24' : 'rgba(0,255,159,0.08)',
            border:`1px solid ${generating ? '#252830' : 'rgba(0,255,159,0.4)'}`,
            borderRadius:2, padding:'4px 10px',
            cursor: generating ? 'wait' : 'pointer' }}>
          {generating ? '◷ generating…' : '✦ ask LLM'}
        </button>
      </div>

      {streamedQ && (
        <div style={{ background:'rgba(0,255,159,0.05)', border:'1px solid rgba(0,255,159,0.3)',
          borderLeft:'2px solid #00FF9F', borderRadius:3, padding:'10px 14px', marginBottom:10 }}>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:8, color:'#00FF9F',
            letterSpacing:'0.1em', marginBottom:4 }}>✦ LIVE LLM SUGGESTION</div>
          <div style={{ fontFamily:'var(--font-sans)', fontSize:13,
            color:'rgba(255,255,255,0.9)', lineHeight:1.55 }}>{streamedQ}</div>
        </div>
      )}

      <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
        {relevant.map((q,i) => renderQ(q, i, true))}
        {relevant.length === 0 && (
          <div style={{ fontFamily:'var(--font-mono)', fontSize:10,
            color:'rgba(255,255,255,0.3)', padding:'6px 0' }}>
            _no anchored questions for this node — see adjacent below_
          </div>
        )}
        {other.map((q,i) => renderQ(q, relevant.length+i, false))}
      </div>
    </div>
  );
}

// ── SETTINGS ───────────────────────────────────────────────────────────────
function SettingsView() {
  const [scanlines, setScanlines] = useState(true);
  const [glow, setGlow] = useState(true);
  const [autoSave, setAutoSave] = useState(true);
  const [strictMode, setStrictMode] = useState(true);
  const [defaultAgent, setDefaultAgent] = useState('claude-code');
  const [coherenceCron, setCoherenceCron] = useState('0 2 * * *');
  const [tokenBudget, setTokenBudget] = useState(500);

  useEffect(() => {
    const after = document.body.style;
    document.body.dataset.scanlines = scanlines ? 'on' : 'off';
  }, [scanlines]);

  const Section = ({ title, code, children }) => (
    <div style={{ marginBottom:24 }}>
      <div style={{ display:'flex', alignItems:'baseline', gap:10, marginBottom:10 }}>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.25)',
          letterSpacing:'0.1em' }}>{code}</span>
        <h3 style={{ fontFamily:'var(--font-sans)', fontSize:14, fontWeight:600, color:'#fff' }}>{title}</h3>
        <div style={{ flex:1, height:1, background:'#1E2028' }}></div>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:2 }}>{children}</div>
    </div>
  );

  const Toggle = ({ label, sub, value, onChange }) => (
    <div style={{ display:'flex', alignItems:'center', gap:14, padding:'12px 16px',
      background:'#0D0F18', border:'1px solid #1E2028', borderRadius:3 }}>
      <div style={{ flex:1 }}>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'#fff' }}>{label}</div>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'rgba(255,255,255,0.35)',
          marginTop:3 }}>{sub}</div>
      </div>
      <div onClick={() => onChange(!value)}
        style={{ width:40, height:20, background: value ? 'rgba(0,255,159,0.18)' : '#1E2028',
          border:`1px solid ${value ? '#00FF9F' : '#252830'}`, borderRadius:10,
          cursor:'pointer', position:'relative', transition:'all 0.15s' }}>
        <div style={{ position:'absolute', top:1, left: value ? 21 : 1,
          width:16, height:16, background: value ? '#00FF9F' : 'rgba(255,255,255,0.3)',
          borderRadius:'50%', transition:'left 0.15s',
          boxShadow: value ? '0 0 6px rgba(0,255,159,0.6)' : 'none' }}></div>
      </div>
    </div>
  );

  const TextInput = ({ label, sub, value, onChange, mono=true, suffix }) => (
    <div style={{ display:'flex', alignItems:'center', gap:14, padding:'12px 16px',
      background:'#0D0F18', border:'1px solid #1E2028', borderRadius:3 }}>
      <div style={{ flex:1 }}>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'#fff' }}>{label}</div>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'rgba(255,255,255,0.35)',
          marginTop:3 }}>{sub}</div>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
        <input value={value} onChange={e=>onChange(e.target.value)}
          style={{ background:'#06080F', border:'1px solid #252830', borderRadius:2,
            padding:'5px 8px', color:'#FFDF00',
            fontFamily: mono ? 'var(--font-mono)' : 'var(--font-sans)',
            fontSize:11, width:160, outline:'none' }}
          onFocus={e => e.currentTarget.style.borderColor = '#00FF9F'}
          onBlur={e => e.currentTarget.style.borderColor = '#252830'} />
        {suffix && <span style={{ fontFamily:'var(--font-mono)', fontSize:10,
          color:'rgba(255,255,255,0.4)' }}>{suffix}</span>}
      </div>
    </div>
  );

  return (
    <div style={{ height:'100%', overflowY:'auto', padding:'24px 32px' }} className="animate-in">
      <div style={{ maxWidth:720 }}>
        <div style={{ marginBottom:24, paddingBottom:16, borderBottom:'1px solid #1E2028' }}>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'rgba(255,255,255,0.3)',
            marginBottom:6 }}>AGENCY // SETTINGS // v0.19</div>
          <h1 style={{ fontFamily:'var(--font-sans)', fontSize:22, fontWeight:700, color:'#fff',
            letterSpacing:'-0.02em' }}>Configuration</h1>
          <p style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'rgba(255,255,255,0.4)',
            marginTop:6 }}>Repo-scoped overrides · stored in <span style={{ color:'#FFDF00' }}>.agency/config.toml</span></p>
        </div>

        <Section title="Display" code="§01">
          <Toggle label="Scanline overlay" sub="Adds CRT-style horizontal lines across the viewport"
            value={scanlines} onChange={setScanlines} />
          <Toggle label="Phosphor glow on accents" sub="Drop-shadow glow on green status indicators"
            value={glow} onChange={setGlow} />
        </Section>

        <Section title="Governance" code="§02">
          <Toggle label="Strict pre-commit mode" sub="Block commits on any failed gate; warnings still allow commit"
            value={strictMode} onChange={setStrictMode} />
          <TextInput label="Coherence-check schedule" sub="Cron expression for nightly maintenance protocol"
            value={coherenceCron} onChange={setCoherenceCron} suffix="UTC" />
          <TextInput label="Default agent" sub="Used when a task is created without an explicit owner"
            value={defaultAgent} onChange={setDefaultAgent} />
        </Section>

        <Section title="Token budget" code="§03">
          <Toggle label="Auto-save friction logs" sub="Commit FL entry when session terminates with FL≥1"
            value={autoSave} onChange={setAutoSave} />
          <TextInput label="Per-task token ceiling" sub="Trigger budget-enforcer fallback above this threshold"
            value={tokenBudget} onChange={v => setTokenBudget(Number(v)||0)} suffix="k tokens" />
        </Section>

        <Section title="Identity" code="§04">
          <div style={{ background:'#0D0F18', border:'1px solid #1E2028', borderRadius:3,
            padding:'14px 16px', fontFamily:'var(--font-mono)', fontSize:10, lineHeight:1.9 }}>
            <div><span style={{ color:'rgba(255,255,255,0.4)' }}>repo:</span> <span style={{ color:'#FFDF00' }}>netzkontrast/agency</span></div>
            <div><span style={{ color:'rgba(255,255,255,0.4)' }}>branch:</span> <span style={{ color:'#00FF9F' }}>main</span></div>
            <div><span style={{ color:'rgba(255,255,255,0.4)' }}>head:</span> <span style={{ color:'#FFDF00' }}>a3f7c91</span></div>
            <div><span style={{ color:'rgba(255,255,255,0.4)' }}>actor:</span> claude-code <span style={{ color:'rgba(255,255,255,0.3)' }}>(default)</span></div>
            <div><span style={{ color:'rgba(255,255,255,0.4)' }}>space:</span> /tasks · /prompts · /research · /skills</div>
          </div>
        </Section>

        <Section title="Danger zone" code="§99">
          <div style={{ display:'flex', gap:10 }}>
            <button style={{ flex:1, padding:'10px 14px', background:'#0D0F18',
              border:'1px solid rgba(255,69,0,0.4)', color:'#FF4500',
              fontFamily:'var(--font-mono)', fontSize:11, cursor:'pointer', borderRadius:2 }}>
              ▸ Rebuild coherence baseline
            </button>
            <button style={{ flex:1, padding:'10px 14px', background:'#0D0F18',
              border:'1px solid rgba(255,69,0,0.4)', color:'#FF4500',
              fontFamily:'var(--font-mono)', fontSize:11, cursor:'pointer', borderRadius:2 }}>
              ▸ Reset frontmatter index
            </button>
          </div>
        </Section>
      </div>
    </div>
  );
}

// ── TOPBAR ─────────────────────────────────────────────────────────────────
function TopBar({ view, onPalette }) {
  const [time, setTime] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);

  return (
    <div style={{ height:40, background:'#0D0F18', borderBottom:'1px solid #1E2028',
      display:'flex', alignItems:'center', padding:'0 16px', flexShrink:0, gap:16 }}>
      <div style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'rgba(255,255,255,0.25)',
        letterSpacing:'0.04em' }}>
        <span className="blink-soft" style={{ color:'#00FF9F' }}>◼</span>{' '}
        agency<span style={{ color:'rgba(255,255,255,0.15)' }}>/</span>
        <span style={{ color:'rgba(255,255,255,0.5)' }}>{view}</span>
      </div>
      <div style={{ position:'relative', width:80, height:6, background:'#1A1D24',
        borderRadius:1, overflow:'hidden' }}>
        <div style={{ position:'absolute', top:0, left:0, height:'100%', width:'25%',
          background:'linear-gradient(90deg, transparent, #00FF9F, transparent)',
          animation:'sweep-bar 2.4s linear infinite' }}></div>
      </div>
      <div style={{ flex:1 }}></div>
      <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.2)' }}>
        {time.toISOString().replace('T',' ').slice(0,19)} UTC
      </div>
      <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(0,255,159,0.6)',
        background:'rgba(0,255,159,0.06)', border:'1px solid rgba(0,255,159,0.15)',
        padding:'2px 8px', borderRadius:2 }}>
        COHERENCE OK
      </div>
      <button onClick={onPalette}
        style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.3)',
          background:'#1A1D24', border:'1px solid #252830', borderRadius:2,
          padding:'3px 10px', cursor:'pointer', letterSpacing:'0.04em' }}>
        ⌘K SEARCH
      </button>
    </div>
  );
}

// ── ROOT APP ───────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('dashboard');
  const [selectedTask, setSelectedTask] = useState(null);
  const [selectedPrompt, setSelectedPrompt] = useState(null);
  const [selectedResearch, setSelectedResearch] = useState(null);
  const [taskFilter, setTaskFilter] = useState('all');
  const [showPalette, setShowPalette] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setShowPalette(p => !p); }
      if (e.key === 'Escape') setShowPalette(false);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  function handleNavigate({ view: v, item }) {
    setView(v);
    if (v === 'tasks' && item) setSelectedTask(item);
    if (v === 'prompts' && item) setSelectedPrompt(item);
    if (v === 'research' && item) setSelectedResearch(item);
  }

  // Determine panel layout
  const showDetail = view !== 'dashboard' && view !== 'graph';
  const LIST_W = showDetail ? 280 : 0;
  const DETAIL_W = showDetail ? undefined : 0;

  return (
    <div style={{ height:'100vh', display:'flex', flexDirection:'column' }}>
      <TopBar view={view} onPalette={() => setShowPalette(true)} />

      <div style={{ flex:1, display:'flex', overflow:'hidden', minHeight:0 }}>
        <Sidebar view={view} onView={setView} onPalette={() => setShowPalette(true)}
          collapsed={sidebarCollapsed} onToggle={() => setSidebarCollapsed(c => !c)} />

        {/* Main area */}
        <div style={{ flex:1, display:'flex', overflow:'hidden', minWidth:0 }}>
          {/* Dashboard */}
          {view === 'dashboard' && (
            <div style={{ flex:1, overflowY:'auto' }}>
              <Dashboard onNavigate={handleNavigate} />
            </div>
          )}

          {/* Graph */}
          {view === 'graph' && (
            <div style={{ flex:1, overflow:'auto' }}>
              <AuditGraph />
            </div>
          )}

          {/* LLM-Wiki */}
          {view === 'wiki' && (
            <div style={{ flex:1, overflow:'hidden' }}>
              <WikiView onNavigate={handleNavigate} />
            </div>
          )}

          {/* Friction Log */}
          {view === 'friction' && (
            <div style={{ flex:1, overflow:'hidden' }}>
              <FrictionLogView />
            </div>
          )}

          {/* Pre-commit */}
          {view === 'precommit' && (
            <div style={{ flex:1, overflow:'hidden' }}>
              <PrecommitView />
            </div>
          )}

          {/* Settings */}
          {view === 'settings' && (
            <div style={{ flex:1, overflow:'hidden' }}>
              <SettingsView />
            </div>
          )}

          {/* Tasks */}
          {view === 'tasks' && (
            <>
              <div style={{ width:LIST_W, borderRight:'1px solid #1E2028', flexShrink:0, overflowY:'auto' }}>
                <TaskList selected={selectedTask} onSelect={setSelectedTask}
                  filter={taskFilter} onFilter={setTaskFilter} />
              </div>
              <div style={{ flex:1, overflowY:'auto', minWidth:0 }}>
                <TaskDetail task={selectedTask} />
              </div>
            </>
          )}

          {/* Prompts */}
          {view === 'prompts' && (
            <>
              <div style={{ width:LIST_W, borderRight:'1px solid #1E2028', flexShrink:0, overflowY:'auto' }}>
                <PromptView selected={selectedPrompt} onSelect={setSelectedPrompt} />
              </div>
              <div style={{ flex:1, overflowY:'auto', minWidth:0 }}>
                <PromptDetail prompt={selectedPrompt} />
              </div>
            </>
          )}

          {/* Research */}
          {view === 'research' && (
            <>
              <div style={{ width:LIST_W, borderRight:'1px solid #1E2028', flexShrink:0, overflowY:'auto' }}>
                <ResearchView selected={selectedResearch} onSelect={setSelectedResearch} />
              </div>
              <div style={{ flex:1, overflowY:'auto', minWidth:0 }}>
                <ResearchDetail research={selectedResearch} />
              </div>
            </>
          )}
        </div>
      </div>

      {showPalette && (
        <CommandPalette
          onClose={() => setShowPalette(false)}
          onNavigate={handleNavigate}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
