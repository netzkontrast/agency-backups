<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGENCY // Decoupled Orchestration Frontend</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="agency-data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:            #0B0D17;
    --bg-panel:      #111318;
    --bg-card:       #161820;
    --border:        #252830;
    --border-bright: #353840;
    --fg:            #ffffff;
    --fg-dim:        rgba(255,255,255,0.45);
    --fg-mid:        rgba(255,255,255,0.72);
    --green:         #00FF9F;
    --green-dim:     rgba(0,255,159,0.12);
    --green-glow:    0 0 12px rgba(0,255,159,0.35);
    --yellow:        #FFD700;
    --yellow-dim:    rgba(255,215,0,0.12);
    --orange:        #FF4500;
    --orange-dim:    rgba(255,69,0,0.12);
    --violet:        #3B3355;
    --gold:          #FFDF00;
    --gold-dim:      rgba(255,223,0,0.12);
    --blue:          #003366;
    --primary:       hsl(56,50%,42%);
    --primary-light: hsl(56,50%,55%);
    --font-sans:     'Space Grotesk', system-ui, sans-serif;
    --font-mono:     'JetBrains Mono', monospace;
    --radius:        3px;
  }

  html, body, #root { height: 100%; overflow: hidden; }

  /* Sidebar collapse */
  .sidebar-collapsed { width: 44px !important; }
  .sidebar-collapsed .sidebar-label,
  .sidebar-collapsed .sidebar-search,
  .sidebar-collapsed .sidebar-footer,
  .sidebar-collapsed .sidebar-group-label { display: none !important; }
  .sidebar-collapsed .sidebar-logo-full { display: none !important; }
  .sidebar-collapsed .sidebar-logo-mini { display: flex !important; }
  .sidebar-logo-mini { display: none; }
  .sidebar-nav-item { transition: background 0.1s, border-color 0.1s, padding 0.2s; }
  .sidebar-transition { transition: width 0.22s cubic-bezier(.4,0,.2,1), opacity 0.18s ease; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--fg);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-dim); }

  /* Glitch animation */
  @keyframes glitch-h {
    0%,100% { clip-path: inset(0 0 100% 0); transform: translateX(0); }
    20% { clip-path: inset(30% 0 50% 0); transform: translateX(-3px); }
    40% { clip-path: inset(60% 0 20% 0); transform: translateX(2px); }
    60% { clip-path: inset(10% 0 80% 0); transform: translateX(-1px); }
    80% { clip-path: inset(80% 0 5% 0); transform: translateX(3px); }
  }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  @keyframes pulse-green { 0%,100% { box-shadow: 0 0 4px rgba(0,255,159,0.4); } 50% { box-shadow: 0 0 12px rgba(0,255,159,0.8); } }
  @keyframes slide-in-right { from { opacity:0; transform:translateX(12px); } to { opacity:1; transform:translateX(0); } }
  @keyframes slide-in-left { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
  @keyframes fade-up { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  @keyframes scan { 0% { top:-20%; } 100% { top:120%; } }
  @keyframes type-cursor { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes glow-pulse {
    0%,100% { box-shadow: 0 0 4px rgba(0,255,159,0.3); border-color: rgba(0,255,159,0.4); }
    50%     { box-shadow: 0 0 14px rgba(0,255,159,0.7); border-color: rgba(0,255,159,0.9); }
  }
  @keyframes data-flow {
    from { stroke-dashoffset: 24; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes count-up { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes node-spawn {
    0%   { opacity: 0; transform: scale(0.4); }
    60%  { opacity: 1; transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes status-blink {
    0%, 90%, 100% { opacity: 1; }
    92%, 98% { opacity: 0.3; }
  }
  @keyframes terminal-line {
    from { opacity: 0; transform: translateY(-2px); clip-path: inset(0 100% 0 0); }
    to   { opacity: 1; transform: translateY(0);    clip-path: inset(0 0 0 0); }
  }
  @keyframes sweep-bar {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }

  .animate-in { animation: fade-up 0.22s ease both; }
  .slide-right { animation: slide-in-right 0.18s ease both; }
  .stagger-row { animation: terminal-line 0.28s cubic-bezier(.2,.8,.2,1) both; }
  .stat-tile { animation: count-up 0.32s ease both; }
  .pulse-glow { animation: glow-pulse 2.4s ease-in-out infinite; }
  .blink-soft { animation: status-blink 4s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const D = window.AGENCY_DATA;

// ── STATUS CONFIG ──────────────────────────────────────────────────────────
const STATUS_CFG = {
  done:        { label: 'DONE',        color: '#00FF9F', bg: 'rgba(0,255,159,0.1)' },
  open:        { label: 'OPEN',        color: '#FFD700', bg: 'rgba(255,215,0,0.1)' },
  in_progress: { label: 'IN_PROG',     color: '#FFDF00', bg: 'rgba(255,223,0,0.1)' },
  blocked:     { label: 'BLOCKED',     color: '#FF4500', bg: 'rgba(255,69,0,0.1)' },
  updated:     { label: 'SUPERSEDED',  color: '#8B8B00', bg: 'rgba(139,139,0,0.1)' },
  complete:    { label: 'COMPLETE',    color: '#00FF9F', bg: 'rgba(0,255,159,0.1)' },
  in_progress_r: { label: 'RUNNING',  color: '#FFDF00', bg: 'rgba(255,223,0,0.1)' },
};

const PRIORITY_COLOR = { P0: '#FF4500', P1: '#FFD700', P2: 'rgba(255,255,255,0.4)' };
const KIND_COLOR = {
  'task-spec':         '#00FF9F',
  'research-proposal': '#FFD700',
  'tool-instruction':  '#FFDF00',
  'follow-up':         '#8B8B00',
};

// Counts up from 0 to target — terminal-style readout, instant for non-numbers
function CountUp({ value, duration = 600 }) {
  const [n, setN] = useState(typeof value === 'number' ? 0 : value);
  useEffect(() => {
    if (typeof value !== 'number') { setN(value); return; }
    const start = performance.now();
    let raf;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setN(Math.round(value * eased));
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value, duration]);
  return <>{n}</>;
}

function StatusBadge({ status, small }) {
  const cfg = STATUS_CFG[status] || { label: status?.toUpperCase(), color: '#fff', bg: 'rgba(255,255,255,0.08)' };
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:4,
      fontFamily:'var(--font-mono)', fontSize: small ? 9 : 10,
      fontWeight:700, letterSpacing:'0.08em',
      color: cfg.color, background: cfg.bg,
      border: `1px solid ${cfg.color}33`,
      padding: small ? '1px 5px' : '2px 7px',
      borderRadius: 2,
    }}>
      <span style={{width:5,height:5,borderRadius:'50%',background:cfg.color,flexShrink:0,
        boxShadow:`0 0 4px ${cfg.color}`}}></span>
      {cfg.label}
    </span>
  );
}

// ── COMMAND PALETTE ────────────────────────────────────────────────────────
function CommandPalette({ onClose, onNavigate }) {
  const [q, setQ] = useState('');
  const inputRef = useRef();
  useEffect(() => { inputRef.current?.focus(); }, []);

  const allItems = useMemo(() => [
    ...D.tasks.map(t => ({ type:'task', label:`[T${t.id}] ${t.slug}`, sub: t.summary, payload:{view:'tasks',item:t} })),
    ...D.prompts.map(p => ({ type:'prompt', label:`[P] ${p.slug}`, sub: p.summary, payload:{view:'prompts',item:p} })),
    ...D.research.map(r => ({ type:'research', label:`[R] ${r.slug}`, sub: r.summary, payload:{view:'research',item:r} })),
    { type:'nav', label:'>> dashboard', sub:'Overview + metrics', payload:{view:'dashboard',item:null} },
    { type:'nav', label:'>> graph', sub:'Audit graph visualization', payload:{view:'graph',item:null} },
  ], []);

  const results = useMemo(() => {
    if (!q.trim()) return allItems.slice(0,12);
    const lq = q.toLowerCase();
    return allItems.filter(i => i.label.toLowerCase().includes(lq) || i.sub?.toLowerCase().includes(lq)).slice(0,12);
  }, [q, allItems]);

  const TYPE_COLOR = { task:'#00FF9F', prompt:'#FFD700', research:'#FFDF00', nav:'#fff' };

  const [sel, setSel] = useState(0);
  useEffect(() => setSel(0), [q]);

  function handleKey(e) {
    if (e.key === 'ArrowDown') { e.preventDefault(); setSel(s => Math.min(s+1,results.length-1)); }
    if (e.key === 'ArrowUp') { e.preventDefault(); setSel(s => Math.max(s-1,0)); }
    if (e.key === 'Enter' && results[sel]) { onNavigate(results[sel].payload); onClose(); }
    if (e.key === 'Escape') onClose();
  }

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', zIndex:1000,
      display:'flex', alignItems:'flex-start', justifyContent:'center', paddingTop:120 }}
      onClick={onClose}>
      <div style={{ width:620, background:'#0F1119', border:'1px solid #353840',
        boxShadow:'0 24px 80px rgba(0,0,0,0.8)', borderRadius:4 }}
        onClick={e => e.stopPropagation()}>
        <div style={{ padding:'10px 14px', borderBottom:'1px solid #252830',
          display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontFamily:'var(--font-mono)', color:'#00FF9F', fontSize:12 }}>▸</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} onKeyDown={handleKey}
            placeholder="search tasks / prompts / research…"
            style={{ flex:1, background:'transparent', border:'none', outline:'none',
              fontFamily:'var(--font-mono)', fontSize:13, color:'#fff',
              letterSpacing:'0.02em' }}/>
          <span style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'rgba(255,255,255,0.3)' }}>ESC</span>
        </div>
        <div style={{ maxHeight:360, overflowY:'auto' }}>
          {results.map((item, i) => (
            <div key={i}
              onClick={() => { onNavigate(item.payload); onClose(); }}
              style={{ padding:'9px 14px', cursor:'pointer', display:'flex', alignItems:'flex-start', gap:10,
                background: i===sel ? 'rgba(0,255,159,0.06)' : 'transparent',
                borderLeft: i===sel ? '2px solid #00FF9F' : '2px solid transparent' }}>
              <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:TYPE_COLOR[item.type],
                marginTop:3, flexShrink:0 }}>{item.type.toUpperCase()}</span>
              <div>
                <div style={{ fontFamily:'var(--font-mono)', fontSize:12, color: i===sel ? '#fff' : 'rgba(255,255,255,0.8)' }}>
                  {item.label}
                </div>
                <div style={{ fontSize:11, color:'rgba(255,255,255,0.35)', marginTop:2, lineHeight:1.4 }}>
                  {item.sub?.slice(0,90)}{item.sub?.length>90?'…':''}
                </div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ padding:'6px 14px', borderTop:'1px solid #252830', display:'flex', gap:16 }}>
          {[['↑↓','navigate'],['↵','select'],['Esc','close']].map(([k,l]) => (
            <span key={k} style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'rgba(255,255,255,0.3)' }}>
              <span style={{ color:'rgba(255,255,255,0.5)' }}>{k}</span> {l}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function Sidebar({ view, onView, onPalette, collapsed, onToggle }) {
  const groups = [
    {
      label: 'WORKSPACE',
      items: [
        { id:'dashboard', icon:'⬡', label:'DASH', tooltip:'Dashboard' },
        { id:'tasks',     icon:'▸', label:'TASKS',    tooltip:'Tasks', badge: D.tasks.filter(t=>t.status==='open').length, badgeColor:'#FFD700' },
        { id:'prompts',   icon:'◈', label:'PROMPTS',  tooltip:'Prompts', badge: D.prompts.length, badgeColor:'rgba(255,255,255,0.35)' },
        { id:'research',  icon:'◎', label:'RESEARCH', tooltip:'Research', badge: D.research.length, badgeColor:'rgba(255,255,255,0.35)' },
      ]
    },
    {
      label: 'ANALYSIS',
      items: [
        { id:'graph',     icon:'⬢', label:'GRAPH',   tooltip:'Audit Graph' },
        { id:'wiki',      icon:'◇', label:'WIKI',    tooltip:'LLM-Wiki' },
      ]
    },
    {
      label: 'OPS',
      items: [
        { id:'friction',  icon:'△', label:'FRICTION', tooltip:'Friction Log', badge: D.frictionLogs.filter(f=>f.level==='FL2'||f.level==='FL3').length, badgeColor:'#FF4500' },
        { id:'precommit', icon:'▣', label:'GATE',     tooltip:'Pre-Commit Gate', badge: D.precommitRuns.filter(r=>r.status==='fail').length, badgeColor:'#FF4500' },
      ]
    },
    {
      label: 'SYS',
      items: [
        { id:'settings',  icon:'⚙', label:'CONFIG',  tooltip:'Settings' },
      ]
    },
  ];

  const blocked = D.tasks.filter(t=>t.status==='blocked').length;
  const inProg  = D.tasks.filter(t=>t.status==='in_progress').length;

  return (
    <div className={`sidebar-transition${collapsed ? ' sidebar-collapsed' : ''}`}
      style={{ width: collapsed ? 44 : 212,
        background:'#09090F', borderRight:'1px solid #1A1C24',
        display:'flex', flexDirection:'column', flexShrink:0, height:'100%',
        overflow:'hidden' }}>

      {/* Logo row */}
      <div style={{ padding: collapsed ? '14px 0' : '16px 16px 12px',
        borderBottom:'1px solid #1A1C24',
        display:'flex', alignItems:'center',
        justifyContent: collapsed ? 'center' : 'space-between', gap:8 }}>

        {/* Mini logo (collapsed) */}
        <div className="sidebar-logo-mini" style={{ display: collapsed ? 'flex' : 'none',
          flexDirection:'column', alignItems:'center', gap:4 }}>
          <div style={{ width:7, height:7, borderRadius:'50%', background:'#00FF9F',
            boxShadow:'0 0 8px #00FF9F',
            animation:'glow-pulse 2.4s ease-in-out infinite' }}></div>
        </div>

        {/* Full logo */}
        <div className="sidebar-logo-full" style={{ display: collapsed ? 'none' : 'block', flex:1 }}>
          <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom:5 }}>
            <div style={{ width:6, height:6, borderRadius:'50%', background:'#00FF9F',
              boxShadow:'0 0 8px #00FF9F', flexShrink:0,
              animation:'glow-pulse 2.4s ease-in-out infinite' }}></div>
            <span style={{ fontFamily:'var(--font-mono)', fontSize:9,
              color:'rgba(255,255,255,0.3)', letterSpacing:'0.1em' }}>AGENCY // v0.19</span>
          </div>
          <div style={{ fontFamily:'var(--font-sans)', fontWeight:700, fontSize:16,
            letterSpacing:'-0.03em', lineHeight:1.1, whiteSpace:'nowrap' }}>
            <span style={{ color:'#00FF9F' }}>netz</span>
            <span style={{ color:'rgba(255,255,255,0.55)' }}>kontrast</span>
          </div>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:8,
            color:'rgba(255,255,255,0.18)', marginTop:4, letterSpacing:'0.06em' }}>
            machine · actor · space
          </div>
        </div>

        {/* Collapse toggle */}
        <button onClick={onToggle}
          title={collapsed ? 'Expand sidebar' : 'Collapse sidebar'}
          style={{ background:'transparent', border:'none', cursor:'pointer',
            color:'rgba(255,255,255,0.25)', fontSize:12, padding:'2px 4px',
            flexShrink:0, lineHeight:1,
            transition:'color 0.15s' }}
          onMouseEnter={e => e.currentTarget.style.color='rgba(255,255,255,0.7)'}
          onMouseLeave={e => e.currentTarget.style.color='rgba(255,255,255,0.25)'}>
          {collapsed ? '›' : '‹'}
        </button>
      </div>

      {/* Search trigger (expanded only) */}
      <div className="sidebar-search"
        onClick={onPalette}
        style={{ margin:'10px 10px 4px', padding:'7px 10px', background:'#0F1018',
          border:'1px solid #1E2028', borderRadius:3, cursor:'pointer',
          display:'flex', alignItems:'center', gap:8, transition:'all 0.15s' }}
        onMouseEnter={e=>{ e.currentTarget.style.borderColor='#2E3140'; e.currentTarget.style.background='#141620'; }}
        onMouseLeave={e=>{ e.currentTarget.style.borderColor='#1E2028'; e.currentTarget.style.background='#0F1018'; }}>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'#00FF9F', opacity:0.7 }}>▸</span>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:11,
          color:'rgba(255,255,255,0.22)', flex:1 }}>search…</span>
        <kbd style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.22)',
          background:'#1A1D24', border:'1px solid #252830', borderRadius:2,
          padding:'1px 5px', lineHeight:1.4 }}>⌘K</kbd>
      </div>

      {/* Nav groups */}
      <nav style={{ flex:1, overflowY:'auto', padding:'4px 0 8px', overflowX:'hidden' }}>
        {groups.map((group, gi) => (
          <div key={group.label}>
            <div className="sidebar-group-label"
              style={{ padding: gi===0 ? '8px 16px 3px' : '12px 16px 3px',
                fontFamily:'var(--font-mono)', fontSize:8,
                color:'rgba(255,255,255,0.18)', letterSpacing:'0.14em',
                whiteSpace:'nowrap' }}>
              {group.label}
            </div>
            {group.items.map(item => {
              const active = view === item.id;
              return (
                <div key={item.id}
                  className="sidebar-nav-item"
                  onClick={() => onView(item.id)}
                  title={collapsed ? item.tooltip : undefined}
                  style={{ padding: collapsed ? '9px 0' : '7px 16px',
                    cursor:'pointer', display:'flex',
                    alignItems:'center', gap:9,
                    justifyContent: collapsed ? 'center' : 'flex-start',
                    background: active ? 'rgba(0,255,159,0.07)' : 'transparent',
                    borderLeft: active ? '2px solid #00FF9F' : '2px solid transparent' }}
                  onMouseEnter={e=>{ if(!active) e.currentTarget.style.background='rgba(255,255,255,0.03)'; }}
                  onMouseLeave={e=>{ if(!active) e.currentTarget.style.background='transparent'; }}>
                  <span style={{ fontFamily:'var(--font-mono)', fontSize:12,
                    color: active ? '#00FF9F' : 'rgba(255,255,255,0.3)',
                    flexShrink:0, textAlign:'center', lineHeight:1 }}>{item.icon}</span>
                  <span className="sidebar-label"
                    style={{ fontFamily:'var(--font-mono)', fontSize:10,
                      letterSpacing:'0.05em',
                      color: active ? '#fff' : 'rgba(255,255,255,0.5)',
                      fontWeight: active ? 600 : 400, flex:1,
                      whiteSpace:'nowrap', overflow:'hidden' }}>
                    {item.label}
                  </span>
                  {!collapsed && item.badge > 0 && (
                    <span style={{ fontFamily:'var(--font-mono)', fontSize:9,
                      color: item.badgeColor?.startsWith('#FF') ? '#FF4500' : item.badgeColor || 'rgba(255,255,255,0.35)',
                      background: item.badgeColor?.startsWith('#FF') ? 'rgba(255,69,0,0.12)' : 'rgba(255,255,255,0.06)',
                      border: `1px solid ${item.badgeColor?.startsWith('#FF') ? 'rgba(255,69,0,0.3)' : 'rgba(255,255,255,0.1)'}`,
                      padding:'1px 5px', borderRadius:2, flexShrink:0 }}>
                      {item.badge}
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </nav>

      {/* Health footer (expanded only) */}
      <div className="sidebar-footer"
        style={{ padding:'10px 16px', borderTop:'1px solid #1A1C24', background:'#080A10' }}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'3px 10px',
          fontFamily:'var(--font-mono)', fontSize:9, lineHeight:1.7 }}>
          <div style={{ color:'rgba(255,255,255,0.25)' }}>IN_PROG
            <span style={{ color:'#FFDF00', marginLeft:5 }}>{inProg}</span>
          </div>
          <div style={{ color:'rgba(255,255,255,0.25)' }}>BLOCKED
            <span style={{ color: blocked>0 ? '#FF4500' : 'rgba(255,255,255,0.4)', marginLeft:5 }}>{blocked}</span>
          </div>
          <div style={{ gridColumn:'1/-1', color:'rgba(255,255,255,0.2)', marginTop:2,
            display:'flex', alignItems:'center', gap:5, fontSize:8 }}>
            <span style={{ color:'#00FF9F' }}>●</span>
            COHERENCE OK · 2026-05-05
          </div>
        </div>
      </div>

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function Dashboard({ onNavigate }) {
  const stats = useMemo(() => {
    const t = D.tasks;
    return {
      total: t.length,
      done: t.filter(x=>x.status==='done').length,
      open: t.filter(x=>x.status==='open').length,
      in_progress: t.filter(x=>x.status==='in_progress').length,
      blocked: t.filter(x=>x.status==='blocked').length,
      updated: t.filter(x=>x.status==='updated').length,
    };
  }, []);

  const recentTasks = D.tasks.filter(t=>['in_progress','open'].includes(t.status)).slice(0,6);
  const liveTickRef = useRef(0);
  const [, force] = useState(0);
  useEffect(() => { const id = setInterval(() => { liveTickRef.current++; force(x=>x+1); }, 1800); return () => clearInterval(id); }, []);
  const flCounts = { FL0:0, FL1:0, FL2:0, FL3:0 };
  D.frictionLogs.forEach(f => { flCounts[f.level]++; });

  return (
    <div style={{ padding:'20px 24px', overflowY:'auto', height:'100%' }} className="animate-in">

          <span style={{ color:'#00FF9F' }}>and Space</span>

        <p style={{ marginTop:6, fontSize:12, color:'rgba(255,255,255,0.4)', fontFamily:'var(--font-mono)' }}>

          { label:'IN PROGRESS', val:stats.in_progress, color:'#FFDF00', sub:'active sessions' },

          { label:'BLOCKED', val:stats.blocked, color:'#FF4500', sub:'needs unblocking' },

      {/* Active tasks */}

                <div style={{ height:'100%', width:`${(count/D.frictionLogs.length)*100}%`,

// ── TASK LIST ──────────────────────────────────────────────────────────────
function TaskList({ selected, onSelect, filter, onFilter }) {
  const filtered = useMemo(() => {
    if (!filter || filter === 'all') return D.tasks;
    return D.tasks.filter(t => t.status === filter);
  }, [filter]);

  const filterOpts = [
    { val:'all', label:'ALL' },
    { val:'open', label:'OPEN' },
    { val:'in_progress', label:'IN_PROG' },
    { val:'blocked', label:'BLOCKED' },
    { val:'done', label:'DONE' },
    { val:'updated', label:'SUPERS.' },
  ];

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <div style={{ padding:'12px 14px 8px', borderBottom:'1px solid #1E2028', flexShrink:0 }}>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.3)',
          letterSpacing:'0.1em', marginBottom:8 }}>TASKS // {filtered.length} records</div>
        <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
          {filterOpts.map(f => (
            <button key={f.val} onClick={() => onFilter(f.val)}
              style={{ fontFamily:'var(--font-mono)', fontSize:9, letterSpacing:'0.06em',
                padding:'3px 7px', borderRadius:2, cursor:'pointer', border:'1px solid',
                borderColor: filter===f.val ? '#00FF9F' : '#252830',
                background: filter===f.val ? 'rgba(0,255,159,0.08)' : 'transparent',
                color: filter===f.val ? '#00FF9F' : 'rgba(255,255,255,0.3)',
                transition:'all 0.1s' }}>
              {f.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{ flex:1, overflowY:'auto', padding:'8px 0' }}>
        {filtered.map(task => {
          const active = selected?.id === task.id;
          return (
            <div key={task.id} onClick={() => onSelect(task)}
              style={{ padding:'10px 14px', cursor:'pointer',
                background: active ? 'rgba(0,255,159,0.06)' : 'transparent',
                borderLeft: active ? '2px solid #00FF9F' : '2px solid transparent',
                borderBottom:'1px solid #12141A',
                transition:'all 0.1s' }}
              onMouseEnter={e=>{ if(!active){ e.currentTarget.style.background='rgba(255,255,255,0.025)'; }}}
              onMouseLeave={e=>{ if(!active){ e.currentTarget.style.background='transparent'; }}}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
                <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.25)',
                  minWidth:24, flexShrink:0 }}>{task.id}</span>
                {task.priority && (
                  <span style={{ fontFamily:'var(--font-mono)', fontSize:8, color:PRIORITY_COLOR[task.priority],
                    border:`1px solid ${PRIORITY_COLOR[task.priority]}44`, padding:'1px 4px', borderRadius:2,
                    flexShrink:0 }}>{task.priority}</span>
                )}
                <StatusBadge status={task.status} small />
              </div>
              <div style={{ fontFamily:'var(--font-mono)', fontSize:11, color: active ? '#fff' : 'rgba(255,255,255,0.75)',
                lineHeight:1.3, wordBreak:'break-all' }}>{task.slug}</div>
              <div style={{ fontFamily:'var(--font-sans)', fontSize:11, color:'rgba(255,255,255,0.35)',
                marginTop:3, lineHeight:1.4 }}>{task.summary?.slice(0,80)}{task.summary?.length>80?'…':''}</div>
            </div>

        })}

    </div>
  );
}

// ── AUDIT GRAPH ────────────────────────────────────────────────────────────
function AuditGraph() {
  const svgRef = useRef();
  const [tooltip, setTooltip] = useState(null);
  const [highlighted, setHighlighted] = useState(null);

  const W = 1100, H = 680;

  // Build nodes + edges
  const nodes = useMemo(() => {
    const all = [];
    const xT = 90, xP = 430, xR = 780;
    const tasks = D.tasks.filter(t => !['updated'].includes(t.status)).slice(0,14);
    const prompts = D.prompts.slice(0,14);
    const research = D.research.slice(0,12);

    tasks.forEach((t,i) => all.push({
      id: `t:${t.slug}`, type:'task', label:t.slug.slice(0,18), slug:t.slug,
      status:t.status, x:xT, y:60 + i*(H-80)/(tasks.length-1||1),
      color: t.status==='done'?'#00FF9F':t.status==='in_progress'?'#FFDF00':t.status==='blocked'?'#FF4500':'#FFD700',
      raw:t
    }));
    prompts.forEach((p,i) => all.push({
      id:`p:${p.slug}`, type:'prompt', label:p.slug.slice(0,18), slug:p.slug,
      x:xP, y:60 + i*(H-80)/(prompts.length-1||1),
      color:KIND_COLOR[p.kind]||'#fff', raw:p
    }));
    research.forEach((r,i) => all.push({
      id:`r:${r.slug}`, type:'research', label:r.slug.slice(0,22), slug:r.slug,
      x:xR, y:60 + i*(H-80)/(research.length-1||1),
      color: r.phase==='complete'?'#00FF9F':'#FFDF00', raw:r
    }));
    return all;
  }, []);

  const edges = useMemo(() => {
    const edgeList = [];
    D.tasks.forEach(t => {
      t.uses_prompts?.forEach(ps => {
        const src = nodes.find(n => n.id===`t:${t.slug}`);
        const dst = nodes.find(n => n.id===`p:${ps}`);
        if (src && dst) edgeList.push({ src, dst, color:'rgba(0,255,159,0.25)', type:'task-prompt' });
      });
      t.spawns_research?.forEach(rs => {
        const src = nodes.find(n => n.id===`t:${t.slug}`);
        const dst = nodes.find(n => n.id===`r:${rs}`);
        if (src && dst) edgeList.push({ src, dst, color:'rgba(255,215,0,0.2)', type:'task-research' });
      });
    });
    D.research.forEach(r => {
      if (r.executes_prompt) {
        const src = nodes.find(n => n.id===`p:${r.executes_prompt}`);
        const dst = nodes.find(n => n.id===`r:${r.slug}`);
        if (src && dst) edgeList.push({ src, dst, color:'rgba(255,223,0,0.3)', type:'prompt-research' });
      }
    });
    return edgeList;
  }, [nodes]);

  const activeEdges = highlighted
    ? edges.filter(e => e.src.id===highlighted || e.dst.id===highlighted)
    : edges;

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'12px 20px 10px', borderBottom:'1px solid #1E2028', flexShrink:0 }}>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.3)',
          letterSpacing:'0.1em', marginBottom:4 }}>AUDIT GRAPH // Task → Prompt → Research</div>
        <div style={{ display:'flex', gap:16 }}>
          {[['Task','#00FF9F'],['Prompt','#FFD700'],['Research','#FFDF00']].map(([l,c]) => (
            <div key={l} style={{ display:'flex', alignItems:'center', gap:5 }}>
              <div style={{ width:8, height:8, borderRadius:1, background:c }}></div>
              <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.4)' }}>{l}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{ flex:1, overflow:'auto', position:'relative' }}>
        <svg width={W} height={H} style={{ display:'block', minWidth:W, minHeight:H }}>
          <defs>
            <filter id="glow-green">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          {/* Column labels */}
          {[['TASKS',90],['PROMPTS',430],['RESEARCH',780]].map(([l,x]) => (
            <text key={l} x={x} y={24} textAnchor="middle"
              style={{ fontFamily:'var(--font-mono)', fontSize:9, fill:'rgba(255,255,255,0.2)',
                letterSpacing:'0.1em' }}>{l}</text>
          ))}

          {/* Edges */}
          {edges.map((e,i) => {
            const isActive = !highlighted || e.src.id===highlighted || e.dst.id===highlighted;
            const x1 = e.src.x + 78, y1 = e.src.y;
            const x2 = e.dst.x - 78, y2 = e.dst.y;
            const mx = (x1+x2)/2;
            return (
              <path key={i}
                d={`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`}
                fill="none"
                stroke={isActive ? e.color : 'rgba(255,255,255,0.04)'}
                strokeWidth={isActive && highlighted && (e.src.id===highlighted||e.dst.id===highlighted) ? 2 : 1}
                style={{ transition:'all 0.2s' }}
              />
            );
          })}

          {/* Nodes */}
          {nodes.map(n => (
            <g key={n.id} transform={`translate(${n.x},${n.y})`}
              style={{ cursor:'pointer' }}
              onMouseEnter={() => { setHighlighted(n.id); setTooltip(n); }}
              onMouseLeave={() => { setHighlighted(null); setTooltip(null); }}>
              <rect x={-78} y={-13} width={156} height={26} rx={2}
                fill={highlighted===n.id ? `${n.color}20` : '#111318'}
                stroke={highlighted===n.id ? n.color : '#252830'}
                strokeWidth={highlighted===n.id ? 1.5 : 1}
                style={{ transition:'all 0.15s' }}
              />
              <circle cx={-64} cy={0} r={4} fill={n.color}
                style={{ filter: highlighted===n.id ? `drop-shadow(0 0 4px ${n.color})` : 'none' }}/>
              <text x={-54} y={4} style={{ fontFamily:'var(--font-mono)', fontSize:9,
                fill: highlighted===n.id ? '#fff' : 'rgba(255,255,255,0.65)',
                pointerEvents:'none' }}>
                {n.label}
              </text>
            </g>
          ))}
        </svg>

        {/* Tooltip */}
        {tooltip && (
          <div style={{ position:'absolute', top:20, right:20, width:260,
            background:'#0D0F18', border:`1px solid ${tooltip.color}44`,
            borderRadius:3, padding:'12px 14px', pointerEvents:'none',
            boxShadow:`0 8px 32px rgba(0,0,0,0.6)` }}>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:8, color:tooltip.color,
              letterSpacing:'0.1em', marginBottom:4 }}>{tooltip.type.toUpperCase()}</div>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'#fff',
              marginBottom:6 }}>{tooltip.slug}</div>
            <div style={{ fontFamily:'var(--font-sans)', fontSize:11, color:'rgba(255,255,255,0.5)',
              lineHeight:1.5 }}>{tooltip.raw.summary?.slice(0,100)}…</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── FRICTION LOG VIEWER ────────────────────────────────────────────────────
const FL_CFG = {
  FL0: { label:'NO FRICTION',  color:'#00FF9F', desc:'clean run' },
  FL1: { label:'MINOR',        color:'#FFD700', desc:'self-resolved' },
  FL2: { label:'MAJOR',        color:'#FF8C00', desc:'manual triage required' },
  FL3: { label:'BLOCKING',     color:'#FF4500', desc:'execution halted' },
};

function FrictionLogView() {
  const [filter, setFilter] = useState('all');
  const [selected, setSelected] = useState(D.frictionLogs[0]);

  const filtered = filter==='all' ? D.frictionLogs : D.frictionLogs.filter(f => f.level === filter);
  const counts = { FL0:0, FL1:0, FL2:0, FL3:0 };
  D.frictionLogs.forEach(f => counts[f.level]++);
  const total = D.frictionLogs.length;

  const totalTokens = D.frictionLogs.reduce((s,f) => s + (f.tokens||0), 0);

  return (
    <div style={{ height:'100%', display:'flex', overflow:'hidden' }} className="animate-in">
      {/* List column */}
      <div style={{ width:340, borderRight:'1px solid #1E2028', display:'flex', flexDirection:'column', flexShrink:0 }}>
        <div style={{ padding:'14px 16px 10px', borderBottom:'1px solid #1E2028' }}>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.3)',
            letterSpacing:'0.1em', marginBottom:8 }}>FRICTION LOG // {total} entries</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:6, marginBottom:10 }}>
            {Object.entries(FL_CFG).map(([k,c]) => (
              <div key={k} onClick={() => setFilter(filter===k ? 'all' : k)}
                style={{ background: filter===k ? `${c.color}14` : '#111318',
                  border: `1px solid ${filter===k ? c.color : '#1E2028'}`,
                  borderRadius:2, padding:'6px 8px', cursor:'pointer',
                  transition:'all 0.12s' }}>
                <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:c.color, fontWeight:700 }}>{k}</div>
                <div style={{ fontFamily:'var(--font-mono)', fontSize:14, color:'#fff', marginTop:2,
                  letterSpacing:'-0.02em' }}>{counts[k]}</div>
              </div>
            ))}
          </div>
          <div style={{ display:'flex', gap:4, fontFamily:'var(--font-mono)', fontSize:9 }}>
            <button onClick={() => setFilter('all')} style={{
              padding:'3px 8px', border:`1px solid ${filter==='all' ? '#00FF9F' : '#252830'}`,
              background: filter==='all' ? 'rgba(0,255,159,0.08)' : 'transparent',
              color: filter==='all' ? '#00FF9F' : 'rgba(255,255,255,0.3)',
              borderRadius:2, cursor:'pointer' }}>ALL</button>
            <span style={{ marginLeft:'auto', color:'rgba(255,255,255,0.25)', alignSelf:'center' }}>
              Σ {(totalTokens/1000).toFixed(1)}k tokens
            </span>
          </div>
        </div>
        <div style={{ flex:1, overflowY:'auto' }}>
          {filtered.map((f,i) => {
            const cfg = FL_CFG[f.level];
            const active = selected === f;
            return (
              <div key={i} onClick={() => setSelected(f)}
                style={{ padding:'12px 16px', cursor:'pointer',
                  background: active ? `${cfg.color}0A` : 'transparent',
                  borderLeft: active ? `2px solid ${cfg.color}` : '2px solid transparent',
                  borderBottom:'1px solid #12141A',
                  transition:'all 0.1s' }}
                onMouseEnter={e=>{ if(!active) e.currentTarget.style.background='rgba(255,255,255,0.02)'; }}
                onMouseLeave={e=>{ if(!active) e.currentTarget.style.background='transparent'; }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5 }}>
                  <span style={{ fontFamily:'var(--font-mono)', fontSize:9, fontWeight:700,
                    color:cfg.color, background:`${cfg.color}14`,
                    border:`1px solid ${cfg.color}33`,
                    padding:'1px 6px', borderRadius:2 }}>{f.level}</span>
                  <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.25)' }}>
                    task:{f.task}
                  </span>
                  <span style={{ marginLeft:'auto', fontFamily:'var(--font-mono)', fontSize:9,
                    color:'rgba(255,255,255,0.3)' }}>{f.duration}</span>
                </div>
                <div style={{ fontFamily:'var(--font-mono)', fontSize:10, color:'rgba(255,255,255,0.3)',
                  marginBottom:4 }}>{f.session.replace('T',' ').slice(0,16)}Z</div>
                <div style={{ fontFamily:'var(--font-sans)', fontSize:11, color:'rgba(255,255,255,0.6)',
                  lineHeight:1.5 }}>{f.note.slice(0,82)}{f.note.length>82?'…':''}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Detail */}
      {selected && <FrictionDetail entry={selected} />}
    </div>
  );
}

// ── LLM-WIKI ────────────────────────────────────────────────────────────
// Obsidian-inspired bidirectional knowledge graph over frontmatter data.
// Every task / prompt / research is a node; uses_prompts, executes_prompt,
// relates_to_task, spawns_research are edges. Wikilinks resolved live.

function buildWikiNode(item, type) {
  let id, title, body, links, color;
  if (type === 'task') {
    id = `task/${item.id}`;
    title = `Task ${item.id} · ${item.slug}`;
    color = '#00FF9F';
    links = [
      ...(item.uses_prompts || []).map(s => ({ to: `prompt/${s}`, kind: 'uses prompt' })),
      ...(item.spawns_research || []).map(s => ({ to: `research/${s}`, kind: 'spawns research' })),
    ];
    body = `# ${title}\n\n**Status:** ${item.status} · **Priority:** ${item.priority || '—'} · **Owner:** ${item.owner || 'unassigned'}\n\n## Summary\n\n${item.summary}\n\n## Linked Prompts\n\n${(item.uses_prompts||[]).length ? item.uses_prompts.map(p => `- [[prompt/${p}]]`).join('\\n') : '_none_'}\n\n## Spawned Research\n\n${(item.spawns_research||[]).length ? item.spawns_research.map(r => `- [[research/${r}]]`).join('\\n') : '_none_'}`;
  } else if (type === 'prompt') {
    id = `prompt/${item.slug}`;
    title = `Prompt · ${item.slug}`;
    color = '#FFD700';
    links = item.relates_to_task ? [{ to: `task/${item.relates_to_task}`, kind: 'relates to task' }] : [];
    body = `# ${title}\n\n**Kind:** ${item.kind}\n\n## Summary\n\n${item.summary}\n\n## Relates to\n\n${item.relates_to_task ? `[[task/${item.relates_to_task}]]` : '_unscoped_'}`;
  } else {
    id = `research/${item.slug}`;
    title = `Research · ${item.slug}`;
    color = '#FFDF00';
    links = item.executes_prompt ? [{ to: `prompt/${item.executes_prompt}`, kind: 'executes prompt' }] : [];
    body = `# ${title}\n\n**Phase:** ${item.phase}\n\n## Summary\n\n${item.summary}\n\n## Executes\n\n${item.executes_prompt ? `[[prompt/${item.executes_prompt}]]` : '_no upstream prompt_'}`;
  }
  return { id, type, title, body, links, color, raw: item };
}

const WIKI_NODES = (() => {
  const all = [];
  D.tasks.forEach(t => all.push(buildWikiNode(t, 'task')));
  D.prompts.forEach(p => all.push(buildWikiNode(p, 'prompt')));
  D.research.forEach(r => all.push(buildWikiNode(r, 'research')));
  // backlinks index
  const backlinks = {};
  all.forEach(n => n.links.forEach(l => {
    backlinks[l.to] = backlinks[l.to] || [];
    backlinks[l.to].push({ from: n.id, kind: l.kind });
  }));
  all.forEach(n => { n.backlinks = backlinks[n.id] || []; });
  return all;
})();
