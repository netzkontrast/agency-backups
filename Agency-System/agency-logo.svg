<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 110" role="img" aria-label="Agency, by Netzkontrast">
  <defs>
    <filter id="lg-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.1" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  <g font-family="DM Serif Display, Cormorant Garamond, Georgia, serif" font-weight="400">
    <text x="0" y="58" font-size="78" letter-spacing="-2" fill="#00FF9F" filter="url(#lg-glow)">A</text>
    <text x="50" y="58" font-size="50" letter-spacing="-1" fill="#FFFFFF">gency</text>
  </g>

  <g transform="translate(2,80)">
    <line x1="0" y1="0" x2="14" y2="0" stroke="#00FF9F" stroke-width="1.2"></line>
    <text x="20" y="3.5" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="3" fill="rgba(255,255,255,0.82)">MACHINE · ACTOR · SPACE</text>
  </g>

  <text x="2" y="100" font-family="JetBrains Mono, ui-monospace, monospace" font-size="8" letter-spacing="1.6" fill="rgba(255,255,255,0.34)">by <tspan fill="#00FF9F">netz</tspan><tspan fill="#FFFFFF">kontrast</tspan></text>
</svg>