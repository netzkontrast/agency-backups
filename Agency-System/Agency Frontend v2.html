<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGENCY — DIAGNOSTIC MONITOR</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="agency-data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #050709;
    --bg2:      #0A0C12;
    --bg3:      #0F1118;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.12);
    --green:    #00FF9F;
    --yellow:   #FFD700;
    --gold:     #FFDF00;
    --orange:   #FF4500;
    --violet:   #3B3355;
    --primary:  hsl(56,50%,42%);
    --dim:      rgba(255,255,255,0.35);
    --mid:      rgba(255,255,255,0.6);
    --bright:   rgba(255,255,255,0.9);
    --font:     'Space Grotesk', sans-serif;
    --mono:     'JetBrains Mono', monospace;
  }

  html, body, #root { height: 100%; overflow: hidden; background: var(--bg); }
  body { font-family: var(--font); font-size: 13px; color: #fff; -webkit-font-smoothing: antialiased; }

  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 9998; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.025) 1px, rgba(0,0,0,0.025) 2px);
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

  /* Animations */
  @keyframes scan-down {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes flicker { 0%,98%,100% { opacity:1; } 99% { opacity:0.85; } }
  @keyframes glitch {
    0%,100% { transform:translateX(0) skewX(0); }
    92% { transform:translateX(0) skewX(0); }
    93% { transform:translateX(-2px) skewX(-0.5deg); }
    94% { transform:translateX(2px) skewX(0.5deg); }
    95% { transform:translateX(0) skewX(0); }
  }
  @keyframes draw-line { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }
  @keyframes node-appear { from { transform: scale(0.6); opacity:0; } to { transform: scale(1); opacity:1; } }
  @keyframes slide-up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes typewriter { from { width:0; } to { width:100%; } }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .panel-header {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.02);
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .corner-tl::before, .corner-tl::after,
  .corner-br::before, .corner-br::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border-color: rgba(0,255,159,0.3);
    border-style: solid;
  }
  .corner-tl::before { top:0; left:0; border-width: 1px 0 0 1px; }
  .corner-br::after { bottom:0; right:0; border-width: 0 1px 1px 0; }

  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }

  .glitch-text { animation: glitch 8s infinite; }
  .flicker { animation: flicker 6s infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const D = window.AGENCY_DATA;

// ── CONSTANTS ──────────────────────────────────────────────────────────────
const STATUS_COLOR = {
  done:        '#00FF9F',
  open:        '#FFD700',
  in_progress: '#FFDF00',
  blocked:     '#FF4500',
  updated:     '#8B8B00',
  complete:    '#00FF9F',
};

const KIND_COLOR = {
  'task-spec':         '#00FF9F',
  'research-proposal': '#FFD700',
  'tool-instruction':  '#FFDF00',
};

const PRIO_COLOR = { P0: '#FF4500', P1: '#FFD700', P2: 'rgba(255,255,255,0.3)' };

// ── COMPONENTS ─────────────────────────────────────────────────────────────

function Dot({ color, size=6, glow=false }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%', background:color, flexShrink:0,
      boxShadow: glow ? `0 0 ${size*1.5}px ${color}` : 'none',
    }} />
  );
}

function Badge({ label, color, bg }) {
  return (
    <span style={{
      fontFamily:'var(--mono)', fontSize:8, fontWeight:700, letterSpacing:'0.1em',
      color: color, background: bg || `${color}18`,
      border:`1px solid ${color}30`, padding:'1px 6px', borderRadius:1,
      display:'inline-flex', alignItems:'center', gap:3,
    }}>
      <Dot color={color} size={4} glow />
      {label}
    </span>
  );
}

// ── LIVE TICKER ────────────────────────────────────────────────────────────
function LiveTicker() {
  const [idx, setIdx] = useState(0);
  const msgs = [
    'COHERENCE_CHECK :: 2026-05-05 :: status=PASS :: issues=0 :: deferred=12',
    'AGENT::claude-code :: task_012 :: review-pr-29 :: phase=in_progress',
    'LINTER :: validate-frontmatter :: 26 tasks scanned :: 0 violations',
    'AGENT::claude-code :: task_015 :: integrate-dramatica-ncp-skills :: FL1',
    'SYSTEM :: pre-commit hook :: tools/check-governance.sh :: exit=0',
    'AUDIT_GRAPH :: 18 edges resolved :: 0 broken linkages detected',
    'FL_LOG :: session=2026-05-05 :: task=012 :: level=FL2 :: logged',
    'TOOLCHAIN :: fm-validate :: fm-extract :: fm-edit :: fm-query :: ACTIVE',
  ];
  useEffect(() => { const t = setInterval(() => setIdx(i => (i+1)%msgs.length), 3200); return () => clearInterval(t); }, []);
  return (
    <div style={{ overflow:'hidden', flex:1 }}>
      <div key={idx} style={{ fontFamily:'var(--mono)', fontSize:9, color:'rgba(0,255,159,0.7)',
        letterSpacing:'0.03em', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
        animation:'slide-up 0.3s ease' }}>
        <span style={{ color:'rgba(0,255,159,0.35)', marginRight:8 }}>►</span>{msgs[idx]}
      </div>
    </div>
  );
}

// ── TOP SYSTEM BAR ─────────────────────────────────────────────────────────
function SystemBar({ activeLayer, setActiveLayer, onSearch }) {
  const [time, setTime] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
  const layers = ['OVERVIEW', 'TASKS', 'PROMPTS', 'RESEARCH', 'GRAPH'];

  return (
    <div style={{ height:44, background:'#050709', borderBottom:'1px solid rgba(0,255,159,0.1)',
      display:'flex', alignItems:'center', padding:'0 16px', gap:20, flexShrink:0 }}>
      {/* Brand */}
      <div style={{ display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
        <div style={{ width:20, height:20, border:'1px solid rgba(0,255,159,0.4)',
          display:'flex', alignItems:'center', justifyContent:'center',
          boxShadow:'0 0 8px rgba(0,255,159,0.2)' }}>
          <span style={{ fontFamily:'var(--mono)', fontSize:9, color:'#00FF9F' }}>A</span>
        </div>
        <div>
          <div style={{ fontFamily:'var(--mono)', fontSize:10, fontWeight:700,
            color:'#fff', letterSpacing:'0.06em' }} className="glitch-text">AGENCY</div>
          <div style={{ fontFamily:'var(--mono)', fontSize:7, color:'rgba(255,255,255,0.25)',
            letterSpacing:'0.1em' }}>DIAGNOSTIC MONITOR</div>
        </div>
      </div>

      {/* Nav tabs */}
      <div style={{ display:'flex', gap:1 }}>
        {layers.map(l => (
          <button key={l} onClick={() => setActiveLayer(l)}
            style={{ fontFamily:'var(--mono)', fontSize:9, letterSpacing:'0.08em',
              padding:'5px 12px', border:'none', cursor:'pointer',
              background: activeLayer===l ? 'rgba(0,255,159,0.1)' : 'transparent',
              color: activeLayer===l ? '#00FF9F' : 'rgba(255,255,255,0.3)',
              borderBottom: activeLayer===l ? '1px solid #00FF9F' : '1px solid transparent',
              transition:'all 0.15s' }}>
            {l}
          </button>
        ))}
      </div>

      {/* Ticker */}
      <LiveTicker />

      {/* Right */}
      <div style={{ display:'flex', alignItems:'center', gap:12, flexShrink:0 }}>
        <button onClick={onSearch}
          style={{ fontFamily:'var(--mono)', fontSize:9, color:'rgba(255,255,255,0.4)',
            background:'transparent', border:'1px solid rgba(255,255,255,0.1)',
            padding:'4px 10px', borderRadius:2, cursor:'pointer', letterSpacing:'0.04em' }}>
          ⌘K
        </button>
        <div style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.2)' }}>
          {time.toISOString().slice(0,19).replace('T',' ')}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:5 }}>
          <div style={{ width:6, height:6, borderRadius:'50%', background:'#00FF9F',
            animation:'pulse 2s infinite', boxShadow:'0 0 6px #00FF9F' }}></div>
          <span style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(0,255,159,0.7)' }}>ONLINE</span>
        </div>
      </div>
    </div>
  );
}

// ── METRICS STRIP ──────────────────────────────────────────────────────────
function MetricsStrip() {
  const t = D.tasks;
  const metrics = [
    { label:'TASKS', val:t.length, color:'#fff' },
    { label:'OPEN', val:t.filter(x=>x.status==='open').length, color:'#FFD700' },
    { label:'IN_PROGRESS', val:t.filter(x=>x.status==='in_progress').length, color:'#FFDF00' },
    { label:'DONE', val:t.filter(x=>x.status==='done').length, color:'#00FF9F' },
    { label:'BLOCKED', val:t.filter(x=>x.status==='blocked').length, color:'#FF4500' },
    { label:'PROMPTS', val:D.prompts.length, color:'rgba(255,255,255,0.6)' },
    { label:'RESEARCH', val:D.research.length, color:'rgba(255,255,255,0.6)' },
    { label:'FL≥1', val:D.frictionLogs.filter(f=>f.level!=='FL0').length, color:'#FF4500' },
  ];
  return (
    <div style={{ height:38, background:'#050709', borderBottom:'1px solid rgba(255,255,255,0.05)',
      display:'flex', alignItems:'stretch', flexShrink:0 }}>
      {metrics.map((m,i) => (
        <div key={m.label} style={{ flex:1, display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center', gap:1,
          borderRight: i<metrics.length-1 ? '1px solid rgba(255,255,255,0.05)' : 'none',
          padding:'0 8px' }}>
          <div style={{ fontFamily:'var(--mono)', fontSize:7, color:'rgba(255,255,255,0.2)',
            letterSpacing:'0.1em' }}>{m.label}</div>
          <div style={{ fontFamily:'var(--mono)', fontSize:14, fontWeight:700,
            color:m.color, lineHeight:1, letterSpacing:'-0.02em' }}>{m.val}</div>
        </div>
      ))}
    </div>
  );
}

// ── OVERVIEW PANEL ─────────────────────────────────────────────────────────
function OverviewPanel({ onNavigate }) {
  const statusGroups = useMemo(() => {
    const groups = {};
    D.tasks.forEach(t => {
      if (!groups[t.status]) groups[t.status] = [];
      groups[t.status].push(t);
    });
    return groups;
  }, []);

  const recentActivity = D.tasks.filter(t => t.status === 'in_progress' || t.status === 'done').slice(0,5);

  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gridTemplateRows:'auto 1fr', gap:8,
      padding:12, height:'100%', overflowY:'auto' }}>

      {/* Status breakdown */}
      <div className="panel" style={{ gridColumn:'1', gridRow:'1' }}>
        <div className="panel-header">
          <Dot color="#00FF9F" size={5} glow />
          <span className="panel-title">status breakdown</span>
        </div>
        <div style={{ padding:'10px 14px', display:'flex', flexDirection:'column', gap:5 }}>
          {Object.entries(statusGroups).map(([status, tasks]) => (
            <div key={status} style={{ display:'flex', alignItems:'center', gap:8 }}>
              <Dot color={STATUS_COLOR[status]||'#fff'} size={5} />
              <span style={{ fontFamily:'var(--mono)', fontSize:9, color:'rgba(255,255,255,0.4)',
                minWidth:80, letterSpacing:'0.04em' }}>{status.toUpperCase()}</span>
              <div style={{ flex:1, height:3, background:'rgba(255,255,255,0.05)', borderRadius:1, overflow:'hidden' }}>
                <div style={{ height:'100%', width:`${(tasks.length/D.tasks.length)*100}%`,
                  background:STATUS_COLOR[status]||'#fff', transition:'width 0.6s ease' }} />
              </div>
              <span style={{ fontFamily:'var(--mono)', fontSize:10, fontWeight:700,
                color:STATUS_COLOR[status]||'#fff', minWidth:18, textAlign:'right' }}>{tasks.length}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Audit graph minimap */}
      <div className="panel" style={{ gridColumn:'2', gridRow:'1' }}>
        <div className="panel-header">
          <Dot color="#FFD700" size={5} glow />
          <span className="panel-title">audit graph</span>
          <button onClick={() => onNavigate('GRAPH')} style={{ marginLeft:'auto',
            fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,215,0,0.6)',
            background:'transparent', border:'none', cursor:'pointer', letterSpacing:'0.06em' }}>
            EXPAND →
          </button>
        </div>
        <MiniGraph />
      </div>

      {/* Coherence + friction */}
      <div className="panel" style={{ gridColumn:'3', gridRow:'1' }}>
        <div className="panel-header">
          <Dot color="#FF4500" size={5} />
          <span className="panel-title">friction log</span>
        </div>
        <div style={{ padding:'10px 12px' }}>
          {D.frictionLogs.map((f,i) => {
            const c = f.level==='FL0'?'#00FF9F':f.level==='FL1'?'#FFD700':'#FF4500';
            return (
              <div key={i} style={{ marginBottom:6, padding:'6px 8px',
                background:'rgba(255,255,255,0.02)', border:`1px solid rgba(255,255,255,0.05)`,
                borderLeft:`2px solid ${c}` }}>
                <div style={{ display:'flex', gap:8, marginBottom:2 }}>
                  <span style={{ fontFamily:'var(--mono)', fontSize:9, fontWeight:700, color:c }}>{f.level}</span>
                  <span style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.25)' }}>
                    task:{f.task} · {f.session}
                  </span>
                </div>
                <div style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.4)', lineHeight:1.4 }}>
                  {f.note.slice(0,60)}…
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Recent activity */}
      <div className="panel" style={{ gridColumn:'1 / span 2', gridRow:'2' }}>
        <div className="panel-header">
          <Dot color="#FFDF00" size={5} glow />
          <span className="panel-title">active + recent tasks</span>
        </div>
        <div style={{ padding:'8px 0', overflowY:'auto', maxHeight:240 }}>
          {D.tasks.filter(t=>['in_progress','open','blocked'].includes(t.status)).slice(0,10).map((t,i) => (
            <div key={t.id} onClick={() => onNavigate('TASKS', t)}
              style={{ padding:'8px 14px', cursor:'pointer', display:'flex', alignItems:'center', gap:10,
                borderBottom:'1px solid rgba(255,255,255,0.03)',
                transition:'background 0.1s' }}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.03)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span style={{ fontFamily:'var(--mono)', fontSize:9, color:'rgba(255,255,255,0.2)',
                minWidth:28 }}>{t.id}</span>
              <Dot color={STATUS_COLOR[t.status]||'#fff'} size={5} />
              <span style={{ fontFamily:'var(--mono)', fontSize:10, color:'rgba(255,255,255,0.75)',
                flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                {t.slug}
              </span>
              {t.priority && <span style={{ fontFamily:'var(--mono)', fontSize:8,
                color:PRIO_COLOR[t.priority] }}>{t.priority}</span>}
              <Badge label={t.status.toUpperCase().slice(0,8)} color={STATUS_COLOR[t.status]||'#fff'} />
            </div>
          ))}
        </div>
      </div>

      {/* Coherence runs */}
      <div className="panel" style={{ gridColumn:'3', gridRow:'2' }}>
        <div className="panel-header">
          <Dot color="#00FF9F" size={5} glow />
          <span className="panel-title">coherence runs</span>
        </div>
        <div style={{ padding:'12px 14px' }}>
          {D.coherenceRuns.map((r,i) => (
            <div key={i} style={{ marginBottom:10, padding:'10px 12px',
              background:'rgba(0,255,159,0.03)', border:'1px solid rgba(0,255,159,0.1)',
              borderRadius:2 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
                <span style={{ fontFamily:'var(--mono)', fontSize:10, color:'rgba(255,255,255,0.6)' }}>{r.date}</span>
                <Badge label={r.status.toUpperCase()} color={r.status==='pass'?'#00FF9F':'#FFDF00'} />
              </div>
              <div style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.3)', lineHeight:1.6 }}>
                issues: <span style={{ color:r.issues===0?'#00FF9F':'#FF4500' }}>{r.issues}</span>
                {' '}· deferred: {r.deferred}
              </div>
              <div style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.25)',
                marginTop:4, lineHeight:1.4 }}>{r.note}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── MINI GRAPH ─────────────────────────────────────────────────────────────
function MiniGraph() {
  const W=260, H=120;
  const tasks   = D.tasks.slice(0,6);
  const prompts = D.prompts.slice(0,4);
  const research= D.research.slice(0,4);
  const padding = 20;

  const nodes = [
    ...tasks.map((t,i) => ({ id:`t:${t.slug}`, x:padding, y:padding+i*(H-padding*2)/(tasks.length-1||1), color:STATUS_COLOR[t.status]||'#fff', r:4 })),
    ...prompts.map((p,i) => ({ id:`p:${p.slug}`, x:W/2, y:padding+i*(H-padding*2)/(prompts.length-1||1), color:KIND_COLOR[p.kind]||'#fff', r:3 })),
    ...research.map((r,i) => ({ id:`r:${r.slug}`, x:W-padding, y:padding+i*(H-padding*2)/(research.length-1||1), color:'#FFDF00', r:3 })),
  ];

  const edges = [];
  D.tasks.slice(0,6).forEach(t => {
    t.uses_prompts?.slice(0,2).forEach(ps => {
      const src = nodes.find(n=>n.id===`t:${t.slug}`);
      const dst = nodes.find(n=>n.id===`p:${ps}`);
      if (src&&dst) edges.push({src,dst,color:'rgba(0,255,159,0.2)'});
    });
  });
  D.research.slice(0,4).forEach(r => {
    if (r.executes_prompt) {
      const src = nodes.find(n=>n.id===`p:${r.executes_prompt}`);
      const dst = nodes.find(n=>n.id===`r:${r.slug}`);
      if (src&&dst) edges.push({src,dst,color:'rgba(255,223,0,0.2)'});
    }
  });

  return (
    <div style={{ padding:'8px 14px' }}>
      <svg width={W} height={H}>
        {edges.map((e,i) => (
          <line key={i} x1={e.src.x} y1={e.src.y} x2={e.dst.x} y2={e.dst.y}
            stroke={e.color} strokeWidth={1}/>
        ))}
        {nodes.map(n => (
          <circle key={n.id} cx={n.x} cy={n.y} r={n.r} fill={n.color}
            style={{ filter:`drop-shadow(0 0 3px ${n.color})` }}/>
        ))}
        {[['T', padding],['P', W/2],['R', W-padding]].map(([l,x]) => (
          <text key={l} x={x} y={H-4} textAnchor="middle"
            style={{ fontFamily:'var(--mono)', fontSize:7, fill:'rgba(255,255,255,0.2)' }}>{l}</text>
        ))}
      </svg>
    </div>
  );
}

// ── FULL GRAPH ─────────────────────────────────────────────────────────────
function FullGraph({ onBack }) {
  const W = 1000, H = 580;
  const [hoveredId, setHoveredId] = useState(null);
  const [tooltip, setTooltip] = useState(null);

  const nodes = useMemo(() => {
    const all = [];
    const tasks = D.tasks.filter(t => t.status !== 'updated').slice(0, 16);
    const prompts = D.prompts.slice(0, 14);
    const research = D.research.slice(0, 12);
    const pad = 70;

    tasks.forEach((t,i) =>
      all.push({ id:`t:${t.slug}`, type:'task', label:t.slug.slice(0,16),
        x:pad, y:pad+i*(H-pad*2)/(tasks.length-1||1),
        color:STATUS_COLOR[t.status]||'#FFD700', raw:t }));
    prompts.forEach((p,i) =>
      all.push({ id:`p:${p.slug}`, type:'prompt', label:p.slug.slice(0,16),
        x:W*0.42, y:pad+i*(H-pad*2)/(prompts.length-1||1),
        color:KIND_COLOR[p.kind]||'#fff', raw:p }));
    research.forEach((r,i) =>
      all.push({ id:`r:${r.slug}`, type:'research', label:r.slug.slice(0,20),
        x:W-pad, y:pad+i*(H-pad*2)/(research.length-1||1),
        color: r.phase==='complete'?'#00FF9F':'#FFDF00', raw:r }));
    return all;
  }, []);

  const edges = useMemo(() => {
    const list = [];
    D.tasks.forEach(t => {
      t.uses_prompts?.forEach(ps => {
        const s = nodes.find(n=>n.id===`t:${t.slug}`);
        const d = nodes.find(n=>n.id===`p:${ps}`);
        if (s&&d) list.push({src:s,dst:d,color:'rgba(0,255,159,0.2)',highlight:'rgba(0,255,159,0.8)'});
      });
      t.spawns_research?.forEach(rs => {
        const s = nodes.find(n=>n.id===`t:${t.slug}`);
        const d = nodes.find(n=>n.id===`r:${rs}`);
        if (s&&d) list.push({src:s,dst:d,color:'rgba(255,215,0,0.15)',highlight:'rgba(255,215,0,0.7)'});
      });
    });
    D.research.forEach(r => {
      if (r.executes_prompt) {
        const s = nodes.find(n=>n.id===`p:${r.executes_prompt}`);
        const d = nodes.find(n=>n.id===`r:${r.slug}`);
        if (s&&d) list.push({src:s,dst:d,color:'rgba(255,223,0,0.2)',highlight:'rgba(255,223,0,0.8)'});
      }
    });
    return list;
  }, [nodes]);

  const activeEdges = useMemo(() => hoveredId
    ? edges.filter(e => e.src.id===hoveredId || e.dst.id===hoveredId)
    : [], [hoveredId, edges]);

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      {/* Graph header */}
      <div style={{ padding:'10px 16px', borderBottom:'1px solid rgba(255,255,255,0.06)',
        display:'flex', alignItems:'center', gap:12, flexShrink:0 }}>
        <span style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.2)',
          letterSpacing:'0.1em' }}>AUDIT GRAPH // task → prompt → research</span>
        <div style={{ display:'flex', gap:12, marginLeft:8 }}>
          {[['Task','#00FF9F'],['Prompt','#FFD700'],['Research','#FFDF00']].map(([l,c]) => (
            <div key={l} style={{ display:'flex', alignItems:'center', gap:5 }}>
              <Dot color={c} size={5} glow />
              <span style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.3)' }}>{l}</span>
            </div>
          ))}
        </div>
        <span style={{ marginLeft:'auto', fontFamily:'var(--mono)', fontSize:8,
          color:'rgba(255,255,255,0.2)' }}>hover nodes to trace connections</span>
      </div>

      {/* SVG */}
      <div style={{ flex:1, overflow:'auto', position:'relative' }}>
        <svg width={W} height={H} style={{ display:'block', minWidth:W }}>
          <defs>
            <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
              <path d="M0,0 L0,6 L6,3 z" fill="rgba(255,255,255,0.15)"/>
            </marker>
          </defs>

          {/* Column labels */}
          {[['TASKS',70],['PROMPTS',W*0.42],['RESEARCH',W-70]].map(([l,x]) => (
            <text key={l} x={x} y={20} textAnchor="middle"
              style={{ fontFamily:'var(--mono)', fontSize:8, fill:'rgba(255,255,255,0.15)',
                letterSpacing:'0.12em' }}>{l}</text>
          ))}
          {[70, W*0.42, W-70].map((x,i) => (
            <line key={i} x1={x} y1={28} x2={x} y2={H-10}
              stroke="rgba(255,255,255,0.04)" strokeWidth={1} strokeDasharray="3,6"/>
          ))}

          {/* Dimmed edges */}
          {edges.map((e,i) => {
            const isActive = activeEdges.includes(e);
            const mx = (e.src.x + e.dst.x) / 2;
            return (
              <path key={i}
                d={`M${e.src.x+60},${e.src.y} C${mx},${e.src.y} ${mx},${e.dst.y} ${e.dst.x-55},${e.dst.y}`}
                fill="none"
                stroke={isActive ? e.highlight : (hoveredId ? 'rgba(255,255,255,0.03)' : e.color)}
                strokeWidth={isActive ? 1.5 : 1}
                style={{ transition:'all 0.15s' }}
              />
            );
          })}

          {/* Nodes */}
          {nodes.map(n => {
            const isHovered = n.id === hoveredId;
            const isConnected = activeEdges.some(e => e.src.id===n.id || e.dst.id===n.id);
            const dimmed = hoveredId && !isHovered && !isConnected;
            return (
              <g key={n.id} transform={`translate(${n.x},${n.y})`}
                style={{ cursor:'pointer' }}
                onMouseEnter={() => { setHoveredId(n.id); setTooltip(n); }}
                onMouseLeave={() => { setHoveredId(null); setTooltip(null); }}>
                <rect x={-55} y={-11} width={110} height={22} rx={2}
                  fill={isHovered ? `${n.color}18` : 'rgba(10,12,18,0.9)'}
                  stroke={isHovered ? n.color : dimmed ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.08)'}
                  strokeWidth={isHovered ? 1.5 : 1}
                  style={{ transition:'all 0.15s',
                    filter: isHovered ? `drop-shadow(0 0 6px ${n.color}60)` : 'none' }}
                />
                <circle cx={-44} cy={0} r={4}
                  fill={dimmed ? `${n.color}30` : n.color}
                  style={{ filter: isHovered ? `drop-shadow(0 0 5px ${n.color})` : 'none',
                    transition:'all 0.15s' }}
                />
                <text x={-34} y={4} style={{
                  fontFamily:'var(--mono)', fontSize:8,
                  fill: dimmed ? 'rgba(255,255,255,0.2)' : isHovered ? '#fff' : 'rgba(255,255,255,0.6)',
                  pointerEvents:'none', transition:'fill 0.15s',
                }}>
                  {n.label}
                </text>
              </g>
            );
          })}
        </svg>

        {/* Hover tooltip */}
        {tooltip && (
          <div style={{ position:'absolute', top:16, right:16, width:280,
            background:'#080A10', border:`1px solid ${tooltip.color}30`,
            borderRadius:2, padding:'12px 14px',
            boxShadow:`0 16px 48px rgba(0,0,0,0.8), 0 0 0 1px ${tooltip.color}10`,
            pointerEvents:'none', animation:'slide-up 0.15s ease' }}>
            <div style={{ fontFamily:'var(--mono)', fontSize:7, color:tooltip.color,
              letterSpacing:'0.14em', marginBottom:6 }}>{tooltip.type.toUpperCase()}</div>
            <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'#fff', marginBottom:6,
              lineHeight:1.3 }}>{tooltip.raw?.slug || tooltip.label}</div>
            <div style={{ fontFamily:'var(--font)', fontSize:11, color:'rgba(255,255,255,0.45)',
              lineHeight:1.5 }}>{tooltip.raw?.summary?.slice(0,100)}…</div>
            {tooltip.type === 'task' && tooltip.raw?.status && (
              <div style={{ marginTop:8 }}>
                <Badge label={tooltip.raw.status.toUpperCase()} color={STATUS_COLOR[tooltip.raw.status]||'#fff'} />
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

                  <Dot color={STATUS_COLOR[t.status]||'#fff'} size={5} glow={active} />
                  {t.priority && <span style={{ fontFamily:'var(--mono)', fontSize:7,
                    color:PRIO_COLOR[t.priority] }}>{t.priority}</span>}
                  <Badge label={(t.status||'').toUpperCase().slice(0,8)}

                <span style={{ fontFamily:'var(--mono)', fontSize:8,

}

          </div>
        </div>
      )}
      {linkedResearch && (
        <div>
          <div style={{ fontFamily:'var(--mono)', fontSize:7, color:'rgba(255,255,255,0.2)',
            letterSpacing:'0.14em', marginBottom:6 }}>SPAWNED RESEARCH</div>
          <div style={{ padding:'8px 12px', background:'rgba(255,223,0,0.04)',
            border:'1px solid rgba(255,223,0,0.1)', borderRadius:2 }}>
            <div style={{ fontFamily:'var(--mono)', fontSize:10, color:'#FFDF00' }}>{linkedResearch.slug}</div>
            <div style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.3)',
              marginTop:2 }}>phase:{linkedResearch.phase}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── RESEARCH PANEL ─────────────────────────────────────────────────────────
function ResearchPanel({ selected, setSelected }) {
  return (
    <div style={{ display:'flex', height:'100%' }}>
      <div style={{ width:320, borderRight:'1px solid rgba(255,255,255,0.06)',
        display:'flex', flexDirection:'column', flexShrink:0 }}>
        <div style={{ padding:'10px 14px 8px', borderBottom:'1px solid rgba(255,255,255,0.05)' }}>
          <div style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.25)',
            letterSpacing:'0.12em' }}>RESEARCH — {D.research.length} workspaces</div>
        </div>
        <div style={{ flex:1, overflowY:'auto' }}>
          {D.research.map(r => {
            const active = selected?.slug === r.slug;
            const c = r.phase==='complete' ? '#00FF9F' : '#FFDF00';
            return (
              <div key={r.slug} onClick={()=>setSelected(r)}
                style={{ padding:'9px 14px', cursor:'pointer',
                  borderBottom:'1px solid rgba(255,255,255,0.03)',
                  background: active ? `${c}06` : 'transparent',
                  borderLeft: active ? `2px solid ${c}` : '2px solid transparent',
                  transition:'all 0.1s' }}
                onMouseEnter={e=>{ if(!active) e.currentTarget.style.background='rgba(255,255,255,0.02)'; }}
                onMouseLeave={e=>{ if(!active) e.currentTarget.style.background='transparent'; }}>
                <div style={{ marginBottom:3 }}>
                  <Badge label={r.phase==='complete'?'COMPLETE':'RUNNING'} color={c} />
                </div>
                <div style={{ fontFamily:'var(--mono)', fontSize:10,
                  color: active ? '#fff' : 'rgba(255,255,255,0.65)' }}>{r.slug}</div>
                {r.executes_prompt && (
                  <div style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,215,0,0.4)',
                    marginTop:3 }}>exec: {r.executes_prompt.slice(0,24)}</div>
                )}
              </div>
            );
          })}
        </div>
      </div>
      <div style={{ flex:1, overflowY:'auto', minWidth:0 }}>
        {!selected ? (
          <div style={{ height:'100%', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <span style={{ fontFamily:'var(--mono)', fontSize:10, color:'rgba(255,255,255,0.12)' }}>
              ◎ select a workspace
            </span>
          </div>
        ) : (
          <ResearchDetailPanel research={selected} key={selected.slug} />
        )}
      </div>
    </div>
  );
}

function ResearchDetailPanel({ research }) {
  const c = research.phase==='complete' ? '#00FF9F' : '#FFDF00';
  const linked = D.prompts.find(p => p.slug===research.executes_prompt);

  return (
    <div style={{ padding:20, animation:'slide-up 0.15s ease' }}>
      <div style={{ marginBottom:14, paddingBottom:12, borderBottom:`1px solid ${c}20` }}>
        <div style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.2)',
          letterSpacing:'0.1em', marginBottom:4 }}>RESEARCH WORKSPACE // {research.created}</div>
        <h2 style={{ fontFamily:'var(--mono)', fontSize:13, fontWeight:700, color:c,
          marginBottom:8, lineHeight:1.3 }}>{research.slug}</h2>
        <Badge label={research.phase==='complete'?'COMPLETE':'RUNNING'} color={c} />
      </div>
      <div style={{ marginBottom:14 }}>
        <p style={{ fontFamily:'var(--font)', fontSize:12, color:'rgba(255,255,255,0.65)', lineHeight:1.65 }}>
          {research.summary}
        </p>
      </div>
      <div style={{ background:'#060810', border:'1px solid rgba(255,255,255,0.07)',
        borderRadius:2, padding:'10px 14px', marginBottom:14,
        fontFamily:'var(--mono)', fontSize:9, lineHeight:2 }}>
        <div style={{ color:'rgba(255,255,255,0.15)' }}>--- # frontmatter</div>
        {[['type','research'],['research_phase',research.phase],
          ['research_executes_prompt',research.executes_prompt||'null'],
          ['created',research.created],['updated',research.updated]
        ].map(([k,v])=>(
          <div key={k} style={{ display:'flex', gap:10 }}>
            <span style={{ color:'rgba(255,255,255,0.3)', minWidth:200 }}>{k}:</span>
            <span style={{ color:'#FFDF00' }}>{v}</span>
          </div>
        ))}
        <div style={{ color:'rgba(255,255,255,0.15)' }}>---</div>
      </div>
      <div style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.2)',
        border:'1px solid rgba(255,255,255,0.06)', borderRadius:2, padding:'8px 12px' }}>
        structure: <span style={{ color:'rgba(255,255,255,0.4)' }}>workspace/ · synthesis/ · reflection/ · output/</span>
      </div>
      {linked && (
        <div style={{ marginTop:12 }}>
          <div style={{ fontFamily:'var(--mono)', fontSize:7, color:'rgba(255,255,255,0.2)',
            letterSpacing:'0.14em', marginBottom:6 }}>EXECUTING PROMPT</div>
          <div style={{ padding:'8px 12px', background:`${KIND_COLOR[linked.kind]||'#FFD700'}06`,
            border:`1px solid ${KIND_COLOR[linked.kind]||'#FFD700'}15`, borderRadius:2 }}>
            <div style={{ fontFamily:'var(--mono)', fontSize:10,
              color:KIND_COLOR[linked.kind]||'#FFD700' }}>{linked.slug}</div>
            <div style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.3)',
              marginTop:2 }}>{linked.kind}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SEARCH PALETTE ─────────────────────────────────────────────────────────
function SearchPalette({ onClose, onNavigate }) {
  const [q, setQ] = useState('');
  const [sel, setSel] = useState(0);
  const inputRef = useRef();
  useEffect(() => inputRef.current?.focus(), []);

  const all = useMemo(() => [
    ...D.tasks.map(t => ({ type:'task', label:`[T${t.id}] ${t.slug}`, detail:t.status, payload:{layer:'TASKS',item:t} })),
    ...D.prompts.map(p => ({ type:'prompt', label:p.slug, detail:p.kind, payload:{layer:'PROMPTS',item:p} })),
    ...D.research.map(r => ({ type:'research', label:r.slug, detail:r.phase, payload:{layer:'RESEARCH',item:r} })),
    { type:'nav', label:'OVERVIEW', detail:'dashboard', payload:{layer:'OVERVIEW',item:null} },
    { type:'nav', label:'AUDIT GRAPH', detail:'graph view', payload:{layer:'GRAPH',item:null} },
  ], []);

  const results = useMemo(() => {
    if (!q.trim()) return all.slice(0,12);
    const lq = q.toLowerCase();
    return all.filter(i => i.label.toLowerCase().includes(lq) || i.detail?.toLowerCase().includes(lq)).slice(0,12);
  }, [q, all]);

  useEffect(() => setSel(0), [q]);

  function handleKey(e) {
    if (e.key==='ArrowDown') { e.preventDefault(); setSel(s=>Math.min(s+1,results.length-1)); }
    if (e.key==='ArrowUp') { e.preventDefault(); setSel(s=>Math.max(s-1,0)); }
    if (e.key==='Enter' && results[sel]) { onNavigate(results[sel].payload); onClose(); }
    if (e.key==='Escape') onClose();
  }

  const TYPE_C = { task:'#00FF9F', prompt:'#FFD700', research:'#FFDF00', nav:'#fff' };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.8)', zIndex:1000,
      display:'flex', alignItems:'flex-start', justifyContent:'center', paddingTop:100 }}
      onClick={onClose}>
      <div style={{ width:560, background:'#080A10', border:'1px solid rgba(255,255,255,0.12)',
        borderRadius:3, boxShadow:'0 32px 80px rgba(0,0,0,0.9)' }}
        onClick={e=>e.stopPropagation()}>
        <div style={{ padding:'10px 16px', borderBottom:'1px solid rgba(255,255,255,0.07)',
          display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontFamily:'var(--mono)', fontSize:10, color:'rgba(0,255,159,0.5)' }}>▸_</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} onKeyDown={handleKey}
            placeholder="search tasks / prompts / research…"
            style={{ flex:1, background:'transparent', border:'none', outline:'none',
              fontFamily:'var(--mono)', fontSize:12, color:'#fff', letterSpacing:'0.02em' }}/>
        </div>
        <div style={{ maxHeight:320, overflowY:'auto' }}>
          {results.map((item,i) => (
            <div key={i} onClick={()=>{ onNavigate(item.payload); onClose(); }}
              style={{ padding:'9px 16px', cursor:'pointer',
                background: i===sel ? 'rgba(0,255,159,0.05)' : 'transparent',
                borderLeft: i===sel ? '2px solid #00FF9F' : '2px solid transparent',
                display:'flex', gap:10, alignItems:'center' }}>
              <span style={{ fontFamily:'var(--mono)', fontSize:7, color:TYPE_C[item.type],
                minWidth:50, letterSpacing:'0.1em' }}>{item.type.toUpperCase()}</span>
              <span style={{ fontFamily:'var(--mono)', fontSize:11,
                color: i===sel?'#fff':'rgba(255,255,255,0.7)', flex:1,
                overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                {item.label}
              </span>
              <span style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.25)' }}>
                {item.detail}
              </span>
            </div>
          ))}
        </div>
        <div style={{ padding:'6px 16px', borderTop:'1px solid rgba(255,255,255,0.05)',
          display:'flex', gap:14 }}>
          {[['↑↓','nav'],['↵','select'],['esc','close']].map(([k,l])=>(
            <span key={k} style={{ fontFamily:'var(--mono)', fontSize:8, color:'rgba(255,255,255,0.2)' }}>
              <span style={{ color:'rgba(255,255,255,0.35)' }}>{k}</span> {l}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── ROOT APP ───────────────────────────────────────────────────────────────
function App() {
  const [layer, setLayer] = useState('OVERVIEW');
  const [showSearch, setShowSearch] = useState(false);
  const [selectedTask, setSelectedTask] = useState(null);
  const [selectedPrompt, setSelectedPrompt] = useState(null);
  const [selectedResearch, setSelectedResearch] = useState(null);

  useEffect(() => {
    const h = e => {
      if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); setShowSearch(p=>!p); }
      if (e.key==='Escape') setShowSearch(false);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  function handleNavigate({ layer: l, item }) {
    setLayer(l);
    if (l==='TASKS' && item) setSelectedTask(item);
    if (l==='PROMPTS' && item) setSelectedPrompt(item);
    if (l==='RESEARCH' && item) setSelectedResearch(item);
  }

  return (
    <div style={{ height:'100vh', display:'flex', flexDirection:'column', background:'var(--bg)' }}>
      <SystemBar activeLayer={layer} setActiveLayer={setLayer} onSearch={()=>setShowSearch(true)} />
      <MetricsStrip />

      {/* Content */}
      <div style={{ flex:1, overflow:'hidden', minHeight:0 }}>
        {layer==='OVERVIEW' && <OverviewPanel onNavigate={(l,item)=>handleNavigate({layer:l,item})} />}
        {layer==='GRAPH' && <FullGraph onBack={()=>setLayer('OVERVIEW')} />}
        {layer==='TASKS' && <TasksPanel selectedTask={selectedTask} setSelectedTask={setSelectedTask} />}
        {layer==='PROMPTS' && <PromptsPanel selected={selectedPrompt} setSelected={setSelectedPrompt} />}
        {layer==='RESEARCH' && <ResearchPanel selected={selectedResearch} setSelected={setSelectedResearch} />}
      </div>

      {showSearch && (
        <SearchPalette onClose={()=>setShowSearch(false)} onNavigate={handleNavigate} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
