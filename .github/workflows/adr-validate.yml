# ADR governance CI — implementation-plan.md §4.
#
# Runs on every push/PR that touches the ADR surface. The workflow is the
# same gate as the local pre-commit hook (tools/check-governance.sh) plus a
# dry-run synthesis check that prevents committing an ADR change without
# refreshing AGENTS.md's guarded section.
name: adr-validate

on:
  push:
    branches: ["main", "claude/**"]
    paths:
      - "decisions/**"
      - "AGENTS.md"
      - "tools/adr/**"
      - "tests/adr/**"
      - "maintenance/schemas/header-ontology.json"
      - ".github/workflows/adr-validate.yml"
  pull_request:
    paths:
      - "decisions/**"
      - "AGENTS.md"
      - "tools/adr/**"
      - "tests/adr/**"
      - "maintenance/schemas/header-ontology.json"
      - ".github/workflows/adr-validate.yml"

jobs:
  adr-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: ./install.sh

      - name: Governance gate
        run: tools/check-governance.sh --no-trust

      - name: ADR test suite
        run: python -m pytest tests/adr/ -q

      - name: Synthesise (dry-run)
        run: |
          python3 tools/adr/cli.py synthesize --dry-run --format=json \
            > /tmp/adr-dry-run.json
          cat /tmp/adr-dry-run.json

      - name: Diff gate — committed AGENTS.md vs dry-run synthesis
        run: |
          set -euo pipefail
          if ! grep -q "<!-- BEGIN AGENCY-ADR SYNTHESIS -->" AGENTS.md; then
            echo "::notice::AGENTS.md does not yet contain the AGENCY-ADR markers; diff gate skipped."
            exit 0
          fi
          python3 - <<'PY'
          import json, pathlib, re, sys
          payload = json.loads(pathlib.Path("/tmp/adr-dry-run.json").read_text())
          body = payload.get("dry_run_body")
          if body is None:
              print("dry-run did not return a body; nothing to diff", file=sys.stderr)
              sys.exit(0)
          text = pathlib.Path("AGENTS.md").read_text(encoding="utf-8")
          m = re.search(
              r"<!-- BEGIN AGENCY-ADR SYNTHESIS -->.*?<!-- END AGENCY-ADR SYNTHESIS -->",
              text, re.DOTALL,
          )
          if not m:
              print("::error::AGENTS.md is missing the BEGIN/END AGENCY-ADR markers (ADR.A.3.5)")
              sys.exit(1)
          # Strip the warning line and markers; compare just the synthesised body.
          inner = m.group(0)
          inner = inner.split("\n", 2)[2].rsplit("\n", 1)[0]
          if inner.rstrip() == body.rstrip():
              print("AGENTS.md guarded section matches dry-run output.")
              sys.exit(0)
          print("::error::AGENTS.md guarded section is stale.")
          print("::error::Run `python3 tools/adr/cli.py synthesize` and re-commit.")
          sys.exit(1)
          PY

      - name: Upload dry-run artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adr-dry-run
          path: /tmp/adr-dry-run.json
          retention-days: 7
