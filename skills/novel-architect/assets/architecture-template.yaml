  # Bei storyform_count: dual wird narratives[1] befüllt
  narratives:
    - id: storyform_a
      throughlines:
        os:   { class: <Universe|Physics|Mind|Psychology>, type: <PLACEHOLDER>, variation: <PLACEHOLDER>, element: <PLACEHOLDER> }
        mc:   { class: <PLACEHOLDER>, type: <PLACEHOLDER>, variation: <PLACEHOLDER>, element: <PLACEHOLDER> }
        ic:   { class: <PLACEHOLDER>, type: <PLACEHOLDER>, variation: <PLACEHOLDER>, element: <PLACEHOLDER> }
        ss:   { class: <PLACEHOLDER>, type: <PLACEHOLDER>, variation: <PLACEHOLDER>, element: <PLACEHOLDER> }
      dynamics:
        mc_resolve:    <Change|Steadfast>
        mc_growth:     <Start|Stop>
        mc_approach:   <Doer|Beer>
        mc_mental_sex: <Linear|Holistic>
        plot_driver:   <Action|Decision>
        plot_limit:    <Timelock|Optionlock>
        outcome:       <Success|Failure>
        judgment:      <Good|Bad>

ncp:
  skeleton_written: false                  # true wenn ncp-author skeleton erstellt
  ncp_file: canon/<slug>.ncp.json
