# =============================================================================
# CATALOG VALIDATION RULES
# =============================================================================
# Phase 2 / Phase 3 validators check these invariants:
#
# 1. Every selected method/framework/replication module has its slots
#    accounted for: phase2_fill slots are filled in slot_fills,
#    fill_from slots resolve to a non-empty value, agent_runtime_fill
#    slots become {{placeholder}} text in the rendered prompt.
#
# 2. Mandatory modules are present in every plan: react, M0-reflection,
#    M13, M1-constraint-blocks, M2-restatement-checkpoint, M4-pre-synthesis.
#
# 3. Cross-pollination set has exactly 2 entries matching the
#    category's `cross_pollination_pair`.
#
# 4. Method count is in [4, 6] (mandatory M13 always counted; defaults
#    + signal swaps fit within the cap).
#
# 5. If framework_structural == 'bespoke', `bespoke_components` is
#    populated with provenance (one entry per component naming source
#    catalog framework).
#
# 6. constraint_blocks always begins with id=0 (M0 reflection); no
#    re-used IDs.
#
# 7. batches always include the three default batches:
#    per-axis-query-expansion (4), per-reflection-checkpoint (5),
#    per-pre-synthesis-audit (8). Domain batches are additional.

